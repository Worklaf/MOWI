<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OCR: MAX QR</title>
    <link rel="icon" type="image/svg+xml" href="mowi-favicon.svg">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flag-icons@7.2.3/css/flag-icons.min.css">
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrious/4.0.2/qrious.min.js"></script>
    <style>
        /* ... (wszystkie poprzednie style bez zmian) ... */
        
        body {
            font-family: 'Segoe UI', sans-serif;
            background: #121212; color: #eee;
            margin: 0; padding: 0;
            height: 100vh; overflow: hidden; position: relative;
        }

        #modeSwitcher {
            position: absolute; top: 20px; left: 20px;
            background: rgba(31,31,31,0.9); padding: 10px 14px;
            border-radius: 12px; box-shadow: 0 10px 30px rgba(0,0,0,0.6);
            display: flex; align-items: center; gap: 8px; z-index: 150; font-size: 14px;
        }
        /* Hover эффекты для контейнеров текста */
        #statusContainer:hover {
            background: linear-gradient(145deg, #334155 0%, #475569 50%, #334155 100%);
            box-shadow: 0 4px 16px rgba(0,0,0,0.4), 0 0 0 1px rgba(255,255,255,0.2);
            transform: translateY(-1px);
            border-color: rgba(148,163,184,0.4);
        }
        #coordsContainer:hover {
            background: linear-gradient(145deg, #334155 0%, #475569 50%, #334155 100%);
            box-shadow: 0 3px 12px rgba(0,0,0,0.4), 0 0 0 1px rgba(255,255,255,0.2);
            transform: translateY(-1px);
            border-color: rgba(148,163,184,0.4);
        }
        /* Hover эффекты для QUICK MULTI тумблера */
        #quickModeSwitcher:hover {
            background: linear-gradient(145deg, #334155 0%, #475569 50%, #334155 100%);
            box-shadow: 0 4px 16px rgba(0,0,0,0.4), 0 0 0 1px rgba(255,255,255,0.2);
            transform: translateY(-1px);
            border-color: rgba(148,163,184,0.4);
        }
        .switch { 
            position: relative; display: inline-block; width: 54px; height: 28px; 
            box-shadow: 0 2px 8px rgba(0,0,0,0.3);
        }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider {
            position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0;
            background: linear-gradient(135deg, #dc2626 0%, #b91c1c 100%); 
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1); 
            border-radius: 34px;
            box-shadow: inset 0 2px 4px rgba(0,0,0,0.2);
        }
        .slider:before {
            position: absolute; content: ""; height: 20px; width: 20px;
            left: 4px; bottom: 4px; 
            background: linear-gradient(135deg, #ffffff 0%, #f3f4f6 100%); 
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1); 
            border-radius: 50%;
            box-shadow: 0 2px 8px rgba(0,0,0,0.3), 0 0 0 1px rgba(255,255,255,0.5);
        }
        input:checked + .slider { 
            background: linear-gradient(135deg, #16a34a 0%, #15803d 100%);
            box-shadow: inset 0 2px 4px rgba(0,0,0,0.2), 0 0 12px rgba(34,197,94,0.3);
        }
        input:checked + .slider:before { 
            transform: translateX(26px); 
            box-shadow: 0 2px 8px rgba(0,0,0,0.3), 0 0 0 1px rgba(255,255,255,0.5);
        }
        .mode-label { 
            font-weight: 700; font-size: 15px; 
            text-shadow: 0 1px 3px rgba(0,0,0,0.5);
            transition: all 0.3s ease;
        }
        .mode-label.on  { 
            color: #4ade80; 
            filter: drop-shadow(0 0 8px rgba(74,222,128,0.4));
        }
        .mode-label.off { 
            color: #f87171; 
            filter: drop-shadow(0 0 8px rgba(248,113,113,0.4));
        }

        #languageSwitcher {
            position: absolute; top: 20px; left: 200px;
            background: rgba(31,31,31,0.9); padding: 10px 14px;
            border-radius: 12px; box-shadow: 0 10px 30px rgba(0,0,0,0.6);
            display: flex; align-items: center; gap: 8px; z-index: 150; font-size: 14px;
        }
        #languageSwitcher .flag-icon { font-size: 22px; line-height: 1; }
        #languageSwitcher select {
            background: #2563eb; color: white; border: none; border-radius: 8px;
            padding: 6px 10px; font-size: 14px; font-weight: 600; cursor: pointer; outline: none;
        }
        #languageSwitcher select:hover { background: #1d4ed8; }

        @media (max-width: 700px) {
            #modeSwitcher    { top: 10px; left: 50%; transform: translateX(-50%); }
            #languageSwitcher{ top: 60px; left: 50%; transform: translateX(-50%); }
        }

        #startScreen {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            background: #1f1f1f; padding: 40px; border-radius: 20px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.7); text-align: center;
            display: flex; flex-direction: column; gap: 20px; z-index: 100;
        }
        h1 { margin: 0 0 10px 0; font-size: 24px; color: #fff; }
        p  { margin: 0 0 20px 0; color: #888; }

        .btn-big {
            padding: 15px 30px; font-size: 18px; cursor: pointer;
            border: none; border-radius: 8px; font-weight: bold; color: white;
            transition: transform 0.1s; display: flex; align-items: center; justify-content: center; gap: 10px;
        }
        .btn-big:active { transform: scale(0.98); }
        .btn-blue  { background: #2563eb; }
        .btn-blue:hover  { background: #1d4ed8; }
        .btn-green { background: #16a34a; }
        .btn-green:hover { background: #15803d; }

        #workControls {
            position: absolute; top: 20px; right: 20px; display: none; z-index: 50; gap: 10px; align-items: center;
        }
        .btn-small {
            padding: 8px 15px; cursor: pointer; border: none; border-radius: 4px; background: #dc2626; color: white;
            font-weight: bold; box-shadow: 0 4px 10px rgba(0,0,0,0.5);
        }
        .btn-ghost {
            padding: 8px 14px; cursor: pointer; border: 1px solid rgba(255,255,255,0.35); border-radius: 6px;
            background: rgba(15,15,15,0.65); color: #f8fafc; font-weight: 600; box-shadow: 0 6px 18px rgba(0,0,0,0.45);
        }
        .canvas-container {
            width: 100%; height: 100%; overflow: auto; background: #000;
            display: flex; justify-content: center; align-items: center;
            position: relative;
        }
        #mainCanvas { 
            box-shadow: 0 0 50px #000; 
            cursor: crosshair;
        }
        #mainCanvas.drawing {
            cursor: none !important;
        }

        /* ═══════════════════════════════════════════════
           QR OVERLAY — NORMALNY MOTYW (domyślny)
        ════════════════════════════════════════════════ */
        #qrOverlay {
            display: none; position: fixed; inset: 0;
            background: rgba(0,0,0,0.95);
            z-index: 9999; flex-direction: column; align-items: center;
            justify-content: space-between; cursor: pointer;
            transition: background 0.4s;
        }

        .qr-overlay-body {
            position: relative; flex: 1; display: flex;
            align-items: center; justify-content: center;
            width: 100%; padding-top: 60px; box-sizing: border-box;
            gap: 0;
        }

        /* Sidebar - teraz z możliwością ukrycia */
        #qhSidebar {
            display: none; flex-direction: column; width: 260px; max-height: 75vh;
            background: rgba(16,16,16,0.95); border: 1px solid #2a2a2a; border-radius: 14px;
            overflow: hidden; cursor: default;
            position: absolute; left: 20px; top: 50%; transform: translateY(-50%); z-index: 10;
            transition: all 0.4s ease;
        }
        
        #qhSidebar.visible {
            display: flex;
            left: 30px;
        }
        
        /* Przycisk przełączania paska historii */
        #historyToggleBtn {
            position: absolute; left: 20px; top: 50%; transform: translateY(-50%);
            width: 44px; height: 44px; border-radius: 50%;
            background: rgba(30,30,30,0.9); border: 1px solid rgba(255,255,255,0.2);
            color: #888; font-size: 20px; cursor: pointer;
            display: none; align-items: center; justify-content: center;
            transition: all 0.25s; z-index: 5;
        }
        #historyToggleBtn:hover { background: rgba(50,50,50,0.95); color: #fff; border-color: rgba(255,255,255,0.4); }
        #historyToggleBtn.visible { display: flex; }

        .qh-header {
            padding: 8px 12px 7px; font-size: 10px; color: #4a4a4a;
            text-transform: uppercase; letter-spacing: 1.4px;
            border-bottom: 1px solid #1c1c1c; text-align: center; flex-shrink: 0;
            transition: color 0.4s, border-color 0.4s;
        }
        #qhList {
            overflow-y: auto; display: grid; grid-template-columns: 1fr 1fr;
            gap: 8px; padding: 8px; box-sizing: border-box;
        }
        #qhList::-webkit-scrollbar { width: 4px; }
        #qhList::-webkit-scrollbar-track { background: #0e0e0e; }
        #qhList::-webkit-scrollbar-thumb { background: #2e2e2e; border-radius: 2px; }

        .qh-card {
            background: #fff; border: 3px solid transparent; border-radius: 10px; padding: 6px;
            cursor: pointer; transition: border-color 0.15s, transform 0.1s, background 0.3s, box-shadow 0.2s;
            text-align: center; min-width: 0; box-sizing: border-box;
        }
        .qh-card:hover  { border-color: #44aaff; transform: scale(1.04); }
        .qh-card.active { border-color: #44aaff; }
        .qh-card img { width: 100%; aspect-ratio: 1/1; object-fit: contain; display: block; border-radius: 4px; }
        .qh-card-code {
            font-size: 9px; color: #222; margin-top: 4px;
            font-family: 'Courier New', monospace; font-weight: bold;
            letter-spacing: 0.5px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
            transition: color 0.3s;
        }

        /* Centralny QR */
        .qr-center {
            display: flex; flex-direction: column; align-items: center;
            cursor: default; position: relative; z-index: 1;
        }
        .qr-container { position: relative; display: flex; flex-direction: column; align-items: center; }

        #captureBtnOverlay {
            position: absolute; top: -60px; left: 50%; transform: translateX(-50%);
            padding: 12px 24px; font-size: 16px; font-weight: bold;
            background: linear-gradient(135deg, #f59e0b, #d97706);
            color: white; border: none; border-radius: 12px; cursor: pointer;
            box-shadow: 0 8px 25px rgba(245,158,11,0.4);
            display: flex; align-items: center; gap: 10px;
            transition: all 0.2s; white-space: nowrap;
        }
        #captureBtnOverlay:hover  { transform: translateX(-50%) scale(1.05); box-shadow: 0 12px 35px rgba(245,158,11,0.5); }
        #captureBtnOverlay:active { transform: translateX(-50%) scale(0.98); }

        .qr-box {
            background: white; padding: 16px; border-radius: 15px; text-align: center;
            box-shadow: 0 0 50px rgba(255,255,255,0.2); cursor: zoom-in;
            transition: transform 0.15s, box-shadow 0.3s, background 0.4s, border-color 0.4s;
            border: 2px solid transparent;
        }
        .qr-box:hover { transform: scale(1.02); box-shadow: 0 0 70px rgba(255,255,255,0.3); }
        
        #bigQrCanvas {
            /* Убираем фиксированные размеры как в QR2.html */
            border-radius: 0;
        }

        #overlayText {
            /* Точные стили как в QR2.html */
            margin-top: 15px;
            font-size: 60px;
            font-family: 'Courier New', monospace;
            font-weight: bold;
            color: #000;
            letter-spacing: 2px;
        }

        .qr-overlay-footer {
            padding: 10px 0 18px; text-align: center; cursor: default; z-index: 1;
            display: flex; flex-direction: column; align-items: center; gap: 8px;
        }
        #hint  { color: #888; font-size: 18px; transition: color 0.4s; }
        #spaceHint { color: #4ade80; font-size: 14px; transition: color 0.4s; }

        /* Przycisk motywu */
        #themeToggleBtn {
            padding: 8px 20px; font-size: 13px; font-weight: 700; letter-spacing: 0.6px;
            border: 1px solid rgba(255,255,255,0.2); border-radius: 30px;
            background: rgba(30,30,30,0.85); color: #999; cursor: pointer;
            transition: all 0.25s; display: flex; align-items: center; gap: 8px;
        }
        #themeToggleBtn:hover {
            background: rgba(55,55,55,0.95); color: #fff; border-color: rgba(255,255,255,0.45);
        }
        #themeToggleBtn .dot {
            width: 8px; height: 8px; border-radius: 50%; background: #555; transition: background 0.3s;
        }

        /* ═══════════════════════════════════════════════
           MOTYW: GLOW
        ════════════════════════════════════════════════ */
        #qrOverlay.theme-glow {
            background: radial-gradient(ellipse at 50% 30%, rgba(20,8,55,0.98) 0%, rgba(4,4,18,0.99) 65%);
        }
        #qrOverlay.theme-glow #qhSidebar {
            background: linear-gradient(145deg, #0f172a 0%, #1a1040 55%, #0f172a 100%);
            border: 1px solid rgba(139,92,246,0.38);
            box-shadow: 0 0 50px rgba(99,102,241,0.22), 0 0 110px rgba(139,92,246,0.12), inset 0 1px 0 rgba(255,255,255,0.06);
        }
        #qrOverlay.theme-glow .qh-header { color: #818cf8; border-bottom-color: rgba(99,102,241,0.22); }
        #qrOverlay.theme-glow .qh-card {
            background: rgba(15,23,42,0.95);
            border-color: rgba(99,102,241,0.22);
        }
        #qrOverlay.theme-glow .qh-card:hover {
            border-color: #7c3aed; transform: scale(1.04);
            box-shadow: 0 0 20px rgba(124,58,237,0.45), 0 0 40px rgba(99,102,241,0.2);
        }
        #qrOverlay.theme-glow .qh-card.active { border-color: #7c3aed; box-shadow: 0 0 20px rgba(124,58,237,0.45); }
        #qrOverlay.theme-glow .qh-card-code { color: #a5b4fc; }
        
        #qrOverlay.theme-glow #historyToggleBtn {
            background: linear-gradient(135deg, rgba(124,58,237,0.2), rgba(37,99,235,0.2));
            border-color: rgba(139,92,246,0.4);
            color: #a5b4fc;
        }
        #qrOverlay.theme-glow #historyToggleBtn:hover {
            background: linear-gradient(135deg, rgba(124,58,237,0.4), rgba(37,99,235,0.4));
            box-shadow: 0 4px 20px rgba(124,58,237,0.3);
        }

        #qrOverlay.theme-glow .qr-box {
            background: linear-gradient(145deg, #0f172a 0%, #1a1040 55%, #0f172a 100%);
            border: 2px solid rgba(139,92,246,0.5);
            box-shadow: 0 0 80px rgba(99,102,241,0.55), 0 0 160px rgba(139,92,246,0.25), inset 0 1px 0 rgba(255,255,255,0.07);
        }
        #qrOverlay.theme-glow .qr-box:hover {
            box-shadow: 0 0 110px rgba(99,102,241,0.7), 0 0 200px rgba(139,92,246,0.35), inset 0 1px 0 rgba(255,255,255,0.07);
        }
        #qrOverlay.theme-glow #bigQrCanvas { border-radius: 10px; }
        #qrOverlay.theme-glow #overlayText {
            background: linear-gradient(135deg, #a78bfa 0%, #818cf8 45%, #38bdf8 100%);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
            color: transparent; filter: drop-shadow(0 0 16px rgba(99,102,241,0.7));
        }
        #qrOverlay.theme-glow #hint { color: #6366f1; }
        #qrOverlay.theme-glow #spaceHint { color: #a78bfa; }
        #qrOverlay.theme-glow #themeToggleBtn {
            background: linear-gradient(135deg, rgba(124,58,237,0.28), rgba(37,99,235,0.28));
            border-color: rgba(139,92,246,0.5); color: #a5b4fc; box-shadow: 0 4px 20px rgba(124,58,237,0.35);
        }
        #qrOverlay.theme-glow #themeToggleBtn:hover {
            background: linear-gradient(135deg, rgba(124,58,237,0.48), rgba(37,99,235,0.48));
            box-shadow: 0 6px 30px rgba(124,58,237,0.55); color: #fff;
        }
        #qrOverlay.theme-glow #themeToggleBtn .dot {
            background: radial-gradient(circle, #a78bfa, #6366f1);
            box-shadow: 0 0 8px rgba(124,58,237,0.8);
        }

        /* ═══════════════════════════════════════════════
           HISTORY VIEWER
        ════════════════════════════════════════════════ */
        #histViewer {
            position: fixed; inset: 0; z-index: 99999;
            display: flex; align-items: center; justify-content: center;
        }
        #histViewer.hidden { display: none; }
        .hv-bg {
            position: absolute; inset: 0; cursor: pointer;
            background: radial-gradient(ellipse at 50% 30%, rgba(20,8,55,0.98) 0%, rgba(4,4,18,0.99) 65%);
        }
        .hv-wrap {
            position: relative; z-index: 1; display: flex; align-items: center; gap: 24px;
            background: linear-gradient(145deg, #0f172a 0%, #1a1040 55%, #0f172a 100%);
            border: 1px solid rgba(139,92,246,0.35); border-radius: 30px; padding: 50px 44px;
            box-shadow: 0 0 80px rgba(99,102,241,0.28), 0 0 180px rgba(139,92,246,0.14), inset 0 1px 0 rgba(255,255,255,0.07);
        }
        .hv-center {
            position: relative; display: flex; flex-direction: column; align-items: center;
            text-align: center; max-width: 90vw; max-height: 85vh;
        }
        #hvCanvas {
            max-width: 420px; max-height: 55vh; border-radius: 14px;
            border: 2px solid rgba(139,92,246,0.4);
            box-shadow: 0 0 50px rgba(99,102,241,0.35); display: block;
        }
        .hv-code-wrap {
            margin-top: 24px;
            background: linear-gradient(135deg, #7c3aed 0%, #4f46e5 35%, #2563eb 70%, #0891b2 100%);
            border-radius: 20px; padding: 18px 44px;
            box-shadow: 0 8px 40px rgba(124,58,237,0.55), 0 0 80px rgba(37,99,235,0.25);
        }
        #hvCode {
            font-size: 46px; font-family: 'Courier New', monospace; font-weight: bold;
            color: #fff; letter-spacing: 8px; text-shadow: 0 2px 18px rgba(0,0,0,0.5); margin: 0;
        }
        #hvCounter { margin-top: 12px; font-size: 13px; color: #6366f1; letter-spacing: 1px; }
        .hv-nav {
            background: rgba(99,102,241,0.12); border: 1px solid rgba(99,102,241,0.35);
            color: #a5b4fc; font-size: 46px; padding: 10px 18px; border-radius: 12px;
            cursor: pointer; transition: background 0.15s, border-color 0.15s;
            user-select: none; line-height: 1; flex-shrink: 0;
        }
        .hv-nav:hover:not(:disabled) { background: rgba(99,102,241,0.28); border-color: rgba(99,102,241,0.55); }
        .hv-nav:disabled { opacity: 0.12; cursor: default; }
        #hvClose {
            position: absolute; top: -48px; right: 0;
            background: rgba(99,102,241,0.12); border: 1px solid rgba(99,102,241,0.35);
            color: #a5b4fc; font-size: 14px; width: 36px; height: 36px; border-radius: 50%;
            cursor: pointer; display: flex; align-items: center; justify-content: center;
            transition: background 0.15s;
        }
        #hvClose:hover { background: rgba(99,102,241,0.3); }

        /* Misc */
        #hiddenPreview { display: none; }
        #captureVideo  { display: none; }
        #coordsDisplay, #windowNameDisplay {
            font-family: 'JetBrains Mono', 'Courier New', monospace; font-size: 13px; letter-spacing: 0.5px;
            background: rgba(15,23,42,0.8); padding: 8px 12px; border-radius: 8px; color: #cbd5f5;
            border: 1px solid rgba(96,165,250,0.35); box-shadow: 0 6px 18px rgba(37,99,235,0.25);
        }
        /* ═══════════════════════════════════════════════
           MULTI QR OVERLAY - УЛУЧШЕННЫЙ
        ════════════════════════════════════════════════ */
        #multiQrOverlay {
            display: none; position: fixed; inset: 0;
            background: rgba(0,0,0,0.95); z-index: 99999;
            flex-direction: column; align-items: center;
            justify-content: center; cursor: pointer;
        }
        .multi-qr-container {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            grid-template-rows: repeat(3, 1fr);
            gap: 10px; /* Маленькие отступы */
            width: 100%; /* УМЕНЬШАЕМ ширину */
            max-width: 1400px; /* УМЕНЬШАЕМ максимальную ширину */
            max-height: 85vh;
            padding: 20px; /* Уменьшаем отступы */
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            border-radius: 25px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.8), inset 0 1px 0 rgba(255,255,255,0.1);
            overflow: hidden;
        }
        .multi-qr-item {
            background: linear-gradient(145deg, #ffffff 0%, #f8fafc 50%, #e2e8f0 100%); /* Красивый градиентный фон */
            padding: 15px; /* УМЕНЬШАЕМ с 25px до 15px */
            border-radius: 25px;
            text-align: center; cursor: pointer;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 20px 50px rgba(0,0,0,0.3), 0 0 0 1px rgba(255,255,255,0.1);
            border: 3px solid transparent;
            position: relative;
            overflow: hidden;
            /* Прямоугольная форма */
            aspect-ratio: 3/2; /* Пропорция 3:2 */
            min-height: 200px;
        }
        .multi-qr-item:hover {
            transform: scale(1.03) translateY(-2px); /* Умеренный эффект */
            box-shadow: 0 15px 35px rgba(0,0,0,0.3), 0 0 0 2px rgba(74,222,128,0.6);
            border-color: #4ade80;
            background: linear-gradient(145deg, #ffffff 0%, #f0fdf4 50%, #dcfce7 100%);
        }
        .multi-qr-item canvas {
            width: auto; height: auto; /* Квадратный QR код */
            max-width: 95%; /* УВЕЛИЧИВАЕМ ширину */
            max-height: 75%; /* УВЕЛИЧИВАЕМ высоту */
            border-radius: 20px; /* УВЕЛИЧИВАЕМ радиус */
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            transition: all 0.4s ease;
            margin-bottom: 10px; /* УВЕЛИЧИВАЕМ отступ для текста */
        }
        .multi-qr-item .code-text {
            position: relative; /* Не абсолютное позиционирование */
            bottom: auto;
            left: auto;
            transform: none;
            margin-top: 15px; /* УВЕЛИЧИВАЕМ отступ еще ниже */
            background: linear-gradient(135deg, #000000 0%, #1a1a1a 100%); /* ЧЕРНЫЙ фон */
            padding: 10px 18px; /* УВЕЛИЧИВАЕМ отступы */
            border-radius: 20px; /* УВЕЛИЧИВАЕМ радиус */

        .multi-qr-show-all {
            position: absolute; top: 20px; left: 50%; transform: translateX(-50%);
            background: linear-gradient(135deg, #22c55e, #16a34a);
            color: white; border: none;
            border-radius: 30px;
            padding: 12px 24px;
            font-size: 16px; font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 8px 25px rgba(34,197,94,0.4);
            z-index: 1000;
        }
        .multi-qr-show-all:hover {
            transform: translateX(-50%) scale(1.05);
            box-shadow: 0 12px 35px rgba(34,197,94,0.6);
            background: linear-gradient(135deg, #16a34a, #15803d);
        }
        .multi-qr-nav {
            position: absolute; top: 50%; transform: translateY(-50%);
            background: rgba(255,255,255,0.9); border: none;
            border-radius: 50%; width: 50px; height: 50px;
            font-size: 24px; cursor: pointer; transition: all 0.2s;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            z-index: 1000;
        }
        .multi-qr-nav:hover {
            background: white; transform: translateY(-50%) scale(1.1);
        }
        .multi-qr-nav.prev { left: 20px; }
        .multi-qr-nav.next { right: 20px; }
        .multi-qr-nav:disabled {
            opacity: 0.3; cursor: not-allowed;
        }
        .multi-qr-page {
            position: absolute; top: 20px; right: 20px;
            background: rgba(255,255,255,0.9); padding: 8px 15px;
            border-radius: 20px; font-size: 14px; font-weight: bold;

            background: rgba(255,255,255,0.9); border: none;
            border-radius: 50%; width: 40px; height: 40px;
            font-size: 18px; cursor: pointer; transition: all 0.2s;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }
        .multi-qr-close:hover {
            background: white; transform: scale(1.1);
        }
    </style>
</head>

<script>
/* ══════════════════════════════════════════════
   ELEMENTY DOM
══════════════════════════════════════════════ */
const mainCanvas    = document.getElementById('mainCanvas');
const ctx           = mainCanvas.getContext('2d');
const previewCanvas = document.getElementById('hiddenPreview');
const pCtx          = previewCanvas.getContext('2d', { willReadFrequently: true });
const captureVideo  = document.getElementById('captureVideo');

let activeStream  = null;
let isDrawing     = false, startX, startY, imgDataSnapshot;
let storedRegion  = null, lastWindowName = null;
let storedSingleRegion = null; // Отдельное сохранение для SINGLE MODE
let storedMultiRegion = null;  // Отдельное сохранение для MULTI MODE
let isCapturing   = false, isProcessing = false, isVideoMode = false;
let isHistoryVisible = true;
let isMultiMode   = false;
let multiRegions  = [];
let multiCodes    = [];
let currentMultiPage = 0;
const ITEMS_PER_PAGE = 12;

const startScreen       = document.getElementById('startScreen');
const workControls      = document.getElementById('workControls');
const statusText        = document.getElementById('statusText');
const modeToggle        = document.getElementById('modeToggle');
const modeLabelOn       = document.getElementById('modeLabelOn');
const modeLabelOff      = document.getElementById('modeLabelOff');
const langSelect        = document.getElementById('langSelect');
const currentFlag       = document.getElementById('currentFlag');
const startTitleEl      = document.getElementById('startTitle');
const startSubtitleEl   = document.getElementById('startSubtitle');
const captureBtn        = document.getElementById('captureBtn');
const fileBtn           = document.getElementById('fileBtn');
const cardsBtn          = document.getElementById('cardsBtn');
const resetBtn          = document.getElementById('resetBtn');
const overlayHintEl     = document.getElementById('hint');
const spaceHintEl       = document.getElementById('spaceHint');
const captureBtnText    = document.getElementById('captureBtnText');
const coordsDisplay     = document.getElementById('coordsDisplay');
const clearCoordsBtn    = document.getElementById('clearCoordsBtn');
const clearSingleCoordsBtn = document.getElementById('clearSingleCoordsBtn');
const clearMultiCoordsBtn = document.getElementById('clearMultiCoordsBtn');
const windowNameDisplay = document.getElementById('windowNameDisplay');
const htmlEl            = document.documentElement;
const qhSidebar         = document.getElementById('qhSidebar');
const qhList            = document.getElementById('qhList');
const qrOverlay         = document.getElementById('qrOverlay');
const themeToggleBtn    = document.getElementById('themeToggleBtn');
const themeBtnLabel     = document.getElementById('themeBtnLabel');
const historyToggleBtn  = document.getElementById('historyToggleBtn');
// const multiModeToggle   = document.getElementById('multiModeToggle'); // УДАЛЕН, НЕ ИСПОЛЬЗУЕТСЯ
const workModeToggle    = document.getElementById('workModeToggle');
const modeIndicator     = document.getElementById('modeIndicator');
const quickMultiToggle  = document.getElementById('quickMultiToggle');
const quickModeStatus   = document.getElementById('quickModeStatus');
const overlayModeToggle = document.getElementById('overlayModeToggle');

const HARDCODED_THRESHOLD = 210;
const STORAGE_KEY         = 'maxqr_savedRegion';
const STORAGE_KEY_WINDOW  = 'maxqr_savedWindow';
const STORAGE_KEY_MODE    = 'maxqr_videoMode';
const STORAGE_KEY_THEME   = 'maxqr_glowTheme';
const STORAGE_KEY_HISTORY = 'maxqr_historyVisible';
const STORAGE_KEY_MULTI   = 'maxqr_multiMode';
const STORAGE_KEY_MULTI_REGIONS = 'maxqr_multiRegions';
const STORAGE_KEY_SINGLE_REGION = 'maxqr_singleRegion'; // Для SINGLE MODE
const STORAGE_KEY_MULTI_REGION = 'maxqr_multiRegion';  // Для MULTI MODE

/* ══════════════════════════════════════════════
   MULTI MODE INITIALIZATION
══════════════════════════════════════════════ */
function initMultiMode() {
    console.log('🚀 Инициализация мультирежима...');
    // Всегда SINGLE MODE по умолчанию при загрузке страницы
    isMultiMode = false;
    localStorage.setItem(STORAGE_KEY_MULTI, false);
    console.log('📊 Принудительно установлен SINGLE MODE при загрузке');
    
    // Главный тумблер удален, пропускаем его инициализацию
    console.log('🔍 Главный тумблер удален, используем только быстрые тумблеры');
    
    if (isMultiMode) {
        loadMultiRegions();
        console.log('📁 MULTI MODE: загружены сохраненные области');
    } else {
        console.log('📁 SINGLE MODE: режим по умолчанию (принудительно)');
    }
    
    // Добавляем логи при загрузке страницы
    console.log('🔍 Проверка быстрых тумблеров:');
    console.log('🔍 Быстрый тумблер:', quickMultiToggle);
    console.log('🔍 Тумблер в overlay:', overlayModeToggle);
    console.log('🔍 Быстрый тумблер существует:', !!quickMultiToggle);
    console.log('🔍 Тумблер в overlay существует:', !!overlayModeToggle);
    
    // Обновляем быстрые тумблеры при инициализации
    updateWorkModeToggle();
    
    // Устанавливаем состояние тумблеров из localStorage
    if (quickMultiToggle) {
        quickMultiToggle.checked = isMultiMode;
    }
    if (overlayModeToggle) {
        overlayModeToggle.checked = isMultiMode;
    }
    
    // Загружаем сохраненные координаты после установки состояния
    loadStoredRegion();
    
    console.log('✅ Инициализация мультирежима завершена');
}

function loadMultiRegions() {
    try {
        const saved = localStorage.getItem(STORAGE_KEY_MULTI_REGIONS);
        if (saved) {
            multiRegions = JSON.parse(saved);
        }
    } catch (err) {
        console.warn('Failed to load multi regions:', err);
        multiRegions = [];
    }
}

function saveMultiRegions() {
    try {
        localStorage.setItem(STORAGE_KEY_MULTI_REGIONS, JSON.stringify(multiRegions));
    } catch (err) {
        console.warn('Failed to save multi regions:', err);
    }
}

function updateWorkModeToggle() {
    // При переключении режима обновляем активные координаты
    console.log('🔄 Переключение режима:', isMultiMode ? 'MULTI' : 'SINGLE');
    
    // Обновляем активные координаты
    if (isMultiMode) {
        storedRegion = storedMultiRegion;
        console.log('📊 Активные координаты (MULTI):', storedMultiRegion);
    } else {
        storedRegion = storedSingleRegion;
        console.log('📊 Активные координаты (SINGLE):', storedSingleRegion);
    }
    
    updateCoordsDisplay(storedRegion);
    
    // Перерисовываем canvas с сохраненными координатами
    if (isMultiMode && storedMultiRegion) {
        // MULTI MODE: рисуем сохраненную MULTI область
        console.log('🎯 Перерисовываю MULTI область:', storedMultiRegion);
        ctx.strokeStyle = '#facc15';
        ctx.lineWidth = 3;
        ctx.setLineDash([5, 5]);
        ctx.strokeRect(storedMultiRegion.x, storedMultiRegion.y, storedMultiRegion.w, storedMultiRegion.h);
    } else if (!isMultiMode && storedSingleRegion) {
        // SINGLE MODE: рисуем сохраненную SINGLE область
        console.log('🎯 Перерисовываю SINGLE область:', storedSingleRegion);
        ctx.strokeStyle = '#4ade80';
        ctx.lineWidth = 2;
        ctx.setLineDash([]);
        ctx.strokeRect(storedSingleRegion.x, storedSingleRegion.y, storedSingleRegion.w, storedSingleRegion.h);
    } else {
        // Нет сохраненных координат - очищаем canvas
        console.log('🎯 Нет сохраненных координат для текущего режима');
        if (activeStream && captureVideo.readyState >= 2) {
            ctx.drawImage(captureVideo, 0, 0);
        }
    }
    
    // Обновляем быстрые тумблеры
    if (quickMultiToggle) {
        quickMultiToggle.checked = isMultiMode;
        if (quickModeStatus) {
            quickModeStatus.textContent = isMultiMode ? 'MULTI' : 'SINGLE';
            quickModeStatus.style.color = isMultiMode ? '#4ade80' : '#888';
        }
        console.log('⚡ Быстрый тумблер обновлен:', isMultiMode ? 'MULTI' : 'SINGLE');
    }
    
    // Обновляем тумблер в overlay
    if (overlayModeToggle) {
        overlayModeToggle.checked = isMultiMode;
        console.log('🎯 Тумблер в overlay обновлен:', isMultiMode ? 'MULTI' : 'SINGLE');
    }
    
    // Автоматически генерируем QR коды только при ручном переключении
    if (isMultiMode && storedMultiRegion && window.manualModeSwitch) {
        console.log('🚀 Автоматическая генерация MULTI QR кодов...');
        console.log('📊 Использую MULTI координаты:', storedMultiRegion);
        setTimeout(() => processMultiRegionAsLines(storedMultiRegion), 300);
    } else if (!isMultiMode && storedSingleRegion && window.manualModeSwitch) {
        console.log('🚀 Автоматическая генерация SINGLE QR кода...');
        console.log('📊 Использую SINGLE координаты:', storedSingleRegion);
        setTimeout(() => processRegion(storedSingleRegion), 300);
    } else {
        console.log('🎯 Нет сохраненных координат для текущего режима или автоматическая инициализация');
    }
}

let isGlowTheme = false;

function initTheme() {
    // Рабочий тумблер удален, пропускаем его инициализацию

    // Добавляем обработчик для быстрого тумблера
    if (quickMultiToggle) {
        console.log('⚡ Быстрый тумблер найден, добавляю обработчик...');
        quickMultiToggle.addEventListener('change', () => {
            console.log('⚡ Быстрый тумблер переключен!');
            isMultiMode = quickMultiToggle.checked;
            localStorage.setItem(STORAGE_KEY_MULTI, isMultiMode);
            window.manualModeSwitch = true; // Устанавливаем флаг ручного переключения
            
            if (isMultiMode) {
                loadMultiRegions();
                // Если MULTI координат нет, используем SINGLE как базовые
                if (!storedMultiRegion && storedSingleRegion) {
                    console.log('📊 Используем SINGLE координаты как базовые для MULTI');
                    storedMultiRegion = storedSingleRegion;
                    localStorage.setItem(STORAGE_KEY_MULTI_REGION, JSON.stringify(storedMultiRegion));
                }
                setStatus('statusMultiReady');
                console.log('✅ MULTI MODE активирован (быстрый)');
            } else {
                console.log('✅ SINGLE MODE активирован (быстрый)');
            }
            
            // Синхронизируем все остальные тумблеры
            updateWorkModeToggle();
            
            // Сбрасываем флаг через небольшую задержку
            setTimeout(() => { window.manualModeSwitch = false; }, 1000);
        });
    if (overlayModeToggle) {
        console.log('✅ Тумблер в overlay найден, добавляю обработчик...');
        overlayModeToggle.checked = isMultiMode;
        overlayModeToggle.addEventListener('change', () => {
            console.log('🔄 Тумблер в overlay переключен!');
            isMultiMode = overlayModeToggle.checked;
            localStorage.setItem(STORAGE_KEY_MULTI, isMultiMode);
            window.manualModeSwitch = true; // Устанавливаем флаг ручного переключения
            
            // Закрываем overlay при переключении режима
            closeOverlay();
            
            if (isMultiMode) {
                loadMultiRegions();
                // Если MULTI координат нет, используем SINGLE как базовые
                if (!storedMultiRegion && storedSingleRegion) {
                    console.log('📊 Используем SINGLE координаты как базовые для MULTI');
                    storedMultiRegion = storedSingleRegion;
                    localStorage.setItem(STORAGE_KEY_MULTI_REGION, JSON.stringify(storedMultiRegion));
                }
                setStatus('statusMultiReady');
                console.log('✅ MULTI MODE активирован (overlay)');
            } else {
                setStatus('statusSingleReady');
                console.log('✅ SINGLE MODE активирован (overlay)');
            }
            
            // Синхронизируем все остальные тумблеры
            updateWorkModeToggle();
            
            // Сбрасываем флаг через небольшую задержку

function loadStoredRegion() {
    try {
        // Пробуем загрузить старый ключ для совместимости
        let r = JSON.parse(localStorage.getItem(STORAGE_KEY)||'null');
        
        // Если старый ключ пустой, пробуем новые раздельные ключи
        if (!r) {
            const singleR = JSON.parse(localStorage.getItem(STORAGE_KEY_SINGLE_REGION)||'null');
            const multiR = JSON.parse(localStorage.getItem(STORAGE_KEY_MULTI_REGION)||'null');
            
            if (isMultiMode && multiR) {
                r = multiR;
            } else if (!isMultiMode && singleR) {
                r = singleR;
            }
        }
        
        storedRegion = (r && isFinite(r.x) && isFinite(r.y) && isFinite(r.w) && isFinite(r.h)) ? r : null;
        
        // Обновляем раздельные переменные для совместимости
        if (isMultiMode) {
            storedMultiRegion = r; // Загружаем MULTI координаты
            storedRegion = storedMultiRegion;
        } else {
            storedSingleRegion = r; // Загружаем SINGLE координаты
            storedRegion = storedSingleRegion;
        }
    } catch { 
        storedRegion = null;
        storedSingleRegion = null;
        storedMultiRegion = null;
    }
    updateCoordsDisplay(storedRegion);
}
function storeRegion(r) {
    const region = { x:Math.round(r.x), y:Math.round(r.y), w:Math.round(r.w), h:Math.round(r.h) };
    
    // Сохраняем в соответствующее хранилище и в старый ключ для совместимости
    if (isMultiMode) {
        storedMultiRegion = region;
        try { localStorage.setItem(STORAGE_KEY_MULTI_REGION, JSON.stringify(region)); } catch {}
    } else {
        storedSingleRegion = region;
        try { localStorage.setItem(STORAGE_KEY_SINGLE_REGION, JSON.stringify(region)); } catch {}
    }
    
    // Также сохраняем в старый ключ для обратной совместимости
    try { localStorage.setItem(STORAGE_KEY, JSON.stringify(region)); } catch {}
    
    // Обновляем общую переменную
    storedRegion = region;
    updateCoordsDisplay(storedRegion);
}
function clearStoredRegion() {
    // Очищаем все сохраненные области
    storedRegion = null;
    storedSingleRegion = null;
    storedMultiRegion = null;
    
    // Очищаем все ключи
    localStorage.removeItem(STORAGE_KEY);
    localStorage.removeItem(STORAGE_KEY_SINGLE_REGION);
    localStorage.removeItem(STORAGE_KEY_MULTI_REGION);
    
    updateCoordsDisplay(null); 
    clearStoredWindow(); 
    setStatus('statusCoordsCleared');
}

    storedSingleRegion = null;

    localStorage.removeItem(STORAGE_KEY_SINGLE_REGION);
    updateCoordsDisplay(storedRegion);
    setStatus('SINGLE координаты очищены');
}

mainCanvas.addEventListener('mousedown', e => {
    if (!mainCanvas.width || !mainCanvas.height) return;
    const rect = mainCanvas.getBoundingClientRect();
    const scaleX = mainCanvas.width / rect.width; 
    const scaleY = mainCanvas.height / rect.height;
    
    startX = (e.clientX - rect.left) * scaleX;
    startY = (e.clientY - rect.top) * scaleY;
    isDrawing = true;
    mainCanvas.classList.add('drawing');
    imgDataSnapshot = ctx.getImageData(0,0, mainCanvas.width, mainCanvas.height);
});
mainCanvas.addEventListener('mousemove', e => {
    if(!isDrawing) return;
    const rect = mainCanvas.getBoundingClientRect();
    const scaleX = mainCanvas.width / rect.width;
    const scaleY = mainCanvas.height / rect.height;
    
    const currentX = (e.clientX - rect.left) * scaleX;
    const currentY = (e.clientY - rect.top) * scaleY;
    
    ctx.putImageData(imgDataSnapshot, 0, 0);
    ctx.strokeStyle = '#facc15';
    ctx.lineWidth = 5;
    ctx.strokeRect(startX, startY, currentX - startX, currentY - startY);
});
mainCanvas.addEventListener('mouseup', async e => {
    if(!isDrawing) return;
    isDrawing = false;
    mainCanvas.classList.remove('drawing');
    
    // Проверяем если это автоматический запуск (не ручное выделение)
    if (e.detail === 'autoRun') {
        console.log('🚀 Автоматический запуск, пропускаем обработку выделения');
        return;
    }
    
    // Добавляем лог для проверки режима
    console.log('🔍 Выделение завершено. Текущий режим:', isMultiMode ? 'MULTI' : 'SINGLE');
    
    const rect = mainCanvas.getBoundingClientRect();
    const scaleX = mainCanvas.width / rect.width;
    const scaleY = mainCanvas.height / rect.height;
    
    const endX = (e.clientX - rect.left) * scaleX;
    const endY = (e.clientY - rect.top) * scaleY;
    
    const w = Math.abs(endX - startX);
    const h = Math.abs(endY - startY);
    
    if (w > 5 && h > 5) {
        const region = { x: Math.min(startX, endX), y: Math.min(startY, endY), w, h };
        
        console.log('📊 Выделенная область:', region);
        
        if (isMultiMode) {
            // MULTI MODE: сохраняем одну большую область и обрабатываем сразу
            console.log('✅ Запускаю MULTI MODE обработку...');
            multiRegions = [region]; // Сохраняем как одну область
            saveMultiRegions();
            
            // Сохраняем в storedMultiRegion для будущих переключений
            storedMultiRegion = region;
            localStorage.setItem(STORAGE_KEY_MULTI_REGION, JSON.stringify(region));
            
            setStatus('MULTI: Обработка строк...');
            await processMultiRegionAsLines(region);
        } else {
            // SINGLE MODE: обрабатываем одну область
            console.log('✅ Запускаю SINGLE MODE обработку...');
            storeRegion(region);
            setStatus('statusProcessing');
            await processRegion(region);
        }
    }
});

mainCanvas.addEventListener('mouseleave', () => {
    if (isDrawing) {
        isDrawing = false;
        mainCanvas.classList.remove('drawing');
        ctx.putImageData(imgDataSnapshot, 0, 0);
    }
});

async function processMultiRegionAsLines(region) {
    console.log('🔍 MULTI MODE: Начинаю обработку области', region);
    multiCodes = [];
    
    // Берем оригинальное изображение
    const sourceCanvas = document.createElement('canvas');
    const sourceCtx = sourceCanvas.getContext('2d');
    sourceCanvas.width = mainCanvas.width;
    sourceCanvas.height = mainCanvas.height;
    sourceCtx.drawImage(mainCanvas, 0, 0);
    
    // Создаем временный canvas для выделенной области
    const tempCanvas = document.createElement('canvas');
    const tempCtx = tempCanvas.getContext('2d', { willReadFrequently: true });
    tempCanvas.width = region.w;
    tempCanvas.height = region.h;
    tempCtx.drawImage(sourceCanvas, region.x, region.y, region.w, region.h, 0, 0, region.w, region.h);
    
    console.log('📊 Изображение скопировано, размер:', region.w, 'x', region.h);
    
    // Анализ строк для крупных QR кодов
    const imageData = tempCtx.getImageData(0, 0, region.w, region.h);
    const lines = await findVerticalLinesForLargeCodes(tempCanvas, imageData);
    console.log('📝 Найдено строк:', lines.length);
    
    if (lines.length === 0) {
        setStatus('statusMultiNotFound');
        return;
    }
    
    // Создаем одно изображение со всеми строками для быстрой OCR
    const allLinesCanvas = createAllLinesCanvas(sourceCanvas, region, lines);
    
    // Запускаем один OCR для всех строк
    const allCodes = await processAllLinesOCR(allLinesCanvas);
    
    // Фильтруем и сохраняем хорошие коды
    for (const code of allCodes) {
        if (code && code.length >= 4) {
            multiCodes.push(code);
            console.log(`✅ Добавлен код: ${code}`);
        }
    }
    
    console.log('🎉 Итого найдено кодов:', multiCodes.length, multiCodes);
    
    if (multiCodes.length > 0) {
        showMultiQrOverlay();
    } else {
        setStatus('statusMultiNotFound');
    }
}

async function findVerticalLinesOptimal(canvas, imageData) {
    const lines = [];
    const width = canvas.width;
    const height = canvas.height;
    const data = imageData.data;
    
    console.log('🔍 Анализирую строки без ограничений...');
    
    // Подсчет черных пикселей
    const rowCounts = new Array(height).fill(0);
    for (let y = 0; y < height; y++) {
        for (let x = 0; x < width; x++) {
            const idx = (y * width + x) * 4;
            if (data[idx] === 0) rowCounts[y]++;
        }
    }
    
    // Находим все строки с черными пикселями
    let inLine = false;
    let lineStart = 0;
    
    for (let y = 0; y < height; y++) {
        const hasPixels = rowCounts[y] >= 1; // Минимум 1 пиксель
        
        if (hasPixels && !inLine) {
            // Начало строки
            inLine = true;
            lineStart = y;
        } else if (!hasPixels && inLine) {
            // Конец строки
            inLine = false;
            const lineHeight = y - lineStart;
            
            if (lineHeight >= 5 && lineHeight <= 100) { // Минимум 5px высота
                // Находим границы текста в строке
                const refinedLine = refineLineBounds(data, width, height, lineStart, y - 1);
                lines.push(refinedLine);
                console.log(`✅ Найдена строка: Y=${lineStart}-${y-1}, высота=${lineHeight}, пикселей=${rowCounts.slice(lineStart, y).reduce((a,b) => a+b, 0)}`);
            }
        }
    }
    
    // Обрабатываем последнюю строку
    if (inLine) {
        const lineHeight = height - lineStart;
        if (lineHeight >= 5 && lineHeight <= 100) { // Минимум 5px
            const refinedLine = refineLineBounds(data, width, height, lineStart, height - 1);
            lines.push(refinedLine);
            console.log(`✅ Найдена последняя строка: Y=${lineStart}-${height-1}, высота=${lineHeight}, пикселей=${rowCounts.slice(lineStart, height).reduce((a,b) => a+b, 0)}`);
        }
    }
    
    console.log(`📊 Итого найдено строк: ${lines.length}`);
    return lines;
}

async function findVerticalLinesForLargeCodes(canvas, imageData) {
    const lines = [];
    const width = canvas.width;
    const height = canvas.height;
    const data = imageData.data;
    
    console.log('🔍 Анализирую крупные QR коды...');
    
    // Подсчет черных пикселей
    const rowCounts = new Array(height).fill(0);
    for (let y = 0; y < height; y++) {
        for (let x = 0; x < width; x++) {
            const idx = (y * width + x) * 4;
            if (data[idx] === 0) rowCounts[y]++;
        }
    }
    
    // Логируем первые строки для анализа
    console.log('📊 Анализ пикселей (первые 50 строк):');
    for (let y = 0; y < Math.min(height, 50); y++) {
        if (rowCounts[y] > 0) {
            console.log(`  Строка ${y}: ${rowCounts[y]} пикселей`);
        }
    }
    
    // Находим пики с очень низким порогом для крупных кодов
    const peaks = [];
    for (let y = 0; y < height; y++) {
        if (rowCounts[y] >= 1) { // Минимум 1 пиксель
            peaks.push(y);
        }
    }
    
    console.log(`📊 Найдено пиков: ${peaks.length}`);
    
    if (peaks.length < 2) {
        console.log('❌ Слишком мало пиков');
        return lines;
    }
    
    // Группируем пики в строки
    let inLine = false;
    let lineStart = 0;
    
    for (let i = 0; i < peaks.length; i++) {
        const currentPeak = peaks[i];
        
        if (!inLine) {
            // Начало новой строки
            inLine = true;
            lineStart = currentPeak;
        } else {
            // Проверяем разрыв между пиками
            const gap = currentPeak - peaks[i-1];
            if (gap > 15) { // Большой разрыв - новая строка
                // Сохраняем предыдущую строку
                const lineHeight = peaks[i-1] - lineStart + 10; // +10 для захвата
                if (lineHeight >= 15 && lineHeight <= 80) {
                    lines.push({
                        x: 0,
                        y: Math.max(0, lineStart - 5),
                        width: width,
                        height: Math.min(height - lineStart, lineHeight + 10)
                    });
                    console.log(`✅ Добавлена строка: Y=${lineStart}-${peaks[i-1] + 10}, высота=${lineHeight + 10}`);
                }
                
                // Начинаем новую строку
                lineStart = currentPeak;
            }
        }
    }
    
    // Добавляем последнюю строку
    if (inLine && peaks.length > 0) {
        const lastPeak = peaks[peaks.length - 1];
        const lineHeight = lastPeak - lineStart + 10;
        if (lineHeight >= 15 && lineHeight <= 80) {
            lines.push({
                x: 0,
                y: Math.max(0, lineStart - 5),
                width: width,
                height: Math.min(height - lineStart, lineHeight + 10)
            });
            console.log(`✅ Добавлена последняя строка: Y=${lineStart}-${lastPeak + 10}, высота=${lineHeight + 10}`);
        }
    }
    
    console.log(`📊 Итого найдено строк: ${lines.length}`);
    return lines;
}

async function findVerticalLinesFast(canvas, imageData) {
    const lines = [];
    const width = canvas.width;
    const height = canvas.height;
    const data = imageData.data;
    
    // Быстрый подсчет черных пикселей
    const rowCounts = new Array(height).fill(0);
    for (let y = 0; y < height; y++) {
        for (let x = 0; x < width; x++) {
            const idx = (y * width + x) * 4;
            if (data[idx] === 0) rowCounts[y]++;
        }
    }
    
    // Находим пики с более низким порогом
    const peaks = [];
    for (let y = 0; y < height; y++) {
        if (rowCounts[y] >= 5) {
            peaks.push(y);
            console.log(`📍 Пик найден: строка ${y}, пикселей: ${rowCounts[y]}`);
        }
    }
    
    if (peaks.length < 2) return lines;
    
    const avgGap = Math.round((peaks[peaks.length-1] - peaks[0]) / (peaks.length - 1));
    const lineCount = Math.min(24, Math.floor(height / avgGap));
    
    for (let i = 0; i < lineCount; i++) {
        const centerY = peaks[0] + (i * avgGap);
        const startY = Math.max(0, centerY - 10);
        const endY = Math.min(height - 1, centerY + 10);
        
        let totalPixels = 0;
        for (let y = startY; y <= endY; y++) {
            totalPixels += rowCounts[y];
        }
        
        if (totalPixels >= 3) { // Снижаем до 3 пикселей для мелких кодов
            lines.push({
                x: 0,
                y: startY,
                width: width,
                height: endY - startY + 1
            });
            console.log(`✅ Строка добавлена: Y=${startY}-${endY}, пикселей: ${totalPixels}`);
        } else {
            console.log(`❌ Строка отфильтрована: Y=${startY}-${endY}, пикселей: ${totalPixels}`);
        }
    }
    
    return lines;
}

function createAllLinesCanvas(sourceCanvas, region, lines) {
    const allLinesCanvas = document.createElement('canvas');
    const allLinesCtx = allLinesCanvas.getContext('2d');
    
    // Создаем вертикальное расположение строк с увеличенными отступами
    const lineHeight = 30; // Увеличиваем высоту строки
    const spacing = 15; // Увеличиваем отступы
    allLinesCanvas.width = region.w;
    allLinesCanvas.height = lines.length * (lineHeight + spacing);
    
    // Белый фон
    allLinesCtx.fillStyle = 'white';
    allLinesCtx.fillRect(0, 0, allLinesCanvas.width, allLinesCanvas.height);
    
    // Копируем каждую строку
    lines.forEach((line, index) => {
        const y = index * (lineHeight + spacing);
        allLinesCtx.drawImage(
            sourceCanvas,
            region.x + line.x, region.y + line.y, line.width, line.height,
            0, y, line.width, lineHeight
        );
    });
    
    return allLinesCanvas;
}

async function processAllLinesOCR(allLinesCanvas) {
    try {
        const ocrLang = ocrLangMap[currentLang] || 'pol';

        return lines;
    } catch (err) {

    }
}

function findVerticalLines(canvas, imageData) {
    const lines = [];
    const width = canvas.width;
    const height = canvas.height;
    const data = imageData.data;
    
    console.log('🔍 Анализирую вертикальные строки...');
    
    // Ищем строки по вертикальным проекциям
    const rowCounts = new Array(height).fill(0);
    
    // Считаем черные пиксели в каждой строке
    for (let y = 0; y < height; y++) {
        for (let x = 0; x < width; x++) {
            const idx = (y * width + x) * 4;
            if (data[idx] === 0) { // Черный пиксель
                rowCounts[y]++;
            }
        }
    }
    
    console.log('📊 Анализ черных пикселей по строкам (первые 50):');
    for (let y = 0; y < Math.min(height, 50); y++) {
        if (rowCounts[y] > 0) {
            console.log(`  Строка ${y}: ${rowCounts[y]} черных пикселей`);
        }
    }
    
    // Новый подход: ищем пики черных пикселей и делим на равные интервалы
    const peaks = [];
    for (let y = 0; y < height; y++) {
        if (rowCounts[y] >= 5) { // Минимум 5 пикселей для пика
            peaks.push(y);
        }
    }
    
    console.log(`📊 Найдено пиков: ${peaks.length}`);
    
    if (peaks.length < 2) {
        console.log('❌ Слишком мало пиков для анализа');
        return lines;
    }
    
    // Определяем средний интервал между пиками
    let totalGap = 0;
    let gapCount = 0;
    for (let i = 1; i < peaks.length; i++) {
        const gap = peaks[i] - peaks[i-1];
        if (gap > 5 && gap < 100) { // Разумные интервалы
            totalGap += gap;
            gapCount++;
        }
    }
    
    const avgGap = gapCount > 0 ? Math.round(totalGap / gapCount) : 25;
    console.log(`📏 Средний интервал между строками: ${avgGap} пикселей`);
    
    // Создаем строки на основе пиков и среднего интервала
    const firstY = peaks[0];
    const lineCount = Math.min(24, Math.floor(height / avgGap)); // Максимум 24 строки
    
    for (let i = 0; i < lineCount; i++) {
        const centerY = firstY + (i * avgGap);
        const startY = Math.max(0, centerY - 10);
        const endY = Math.min(height - 1, centerY + 10);
        
        console.log(`📝 Строка ${i+1}: центр Y=${centerY}, диапазон ${startY}-${endY}`);
        
        // Проверяем что в этой области есть черные пиксели
        let totalPixels = 0;
        for (let y = startY; y <= endY; y++) {
            totalPixels += rowCounts[y];
        }
            
        // Фильтруем по качеству - минимум 10 черных пикселей
        if (totalPixels >= 10) {
            const refinedLine = refineLineBounds(data, width, height, startY, endY);
            lines.push(refinedLine);
            console.log(`✅ Добавлена строка:`, refinedLine);
        } else {
            console.log(`❌ Группа ${i+1} отфильтрована: мало пикселей (${totalPixels})`);
        }
    }
        
    console.log(`📊 Итого добавлено строк: ${lines.length}`);
        
    return lines;
}

function isValidCode(code) {
    // Проверка на реалистичные QR коды
    if (!code || typeof code !== 'string') return false;
    
    // Убираем лишние нули в начале если код слишком длинный
    const cleanCode = code.replace(/^0+/, '');
    
    // Проверяем что код состоит только из цифр
    if (!/^\d+$/.test(cleanCode)) return false;
    
    // Проверяем длину (4-16 символов после очистки)
    if (cleanCode.length < 4 || cleanCode.length > 16) return false;
    
    // Проверяем что это не все одинаковые цифры
    if (/^(\d)\1+$/.test(cleanCode)) return false;
    
    console.log(`🔍 Валидация кода: ${code} -> ${cleanCode} ✅`);
    return true;
}

function refineLineBounds(data, width, height, startY, endY) {
    // Находим фактические границы текста в строке
    let minX = width;
    let maxX = 0;
    let actualStartY = endY;
    let actualEndY = startY;
    
    for (let y = startY; y <= endY; y++) {
        let hasTextInRow = false;
        
        for (let x = 0; x < width; x++) {
            const idx = (y * width + x) * 4;
            if (data[idx] === 0) { // Черный пиксель
                minX = Math.min(minX, x);
                maxX = Math.max(maxX, x);
                hasTextInRow = true;
                actualStartY = Math.min(actualStartY, y);
                actualEndY = Math.max(actualEndY, y);
            }
        }
    }
    
    // Добавляем небольшие отступы
    minX = Math.max(0, minX - 5);
    maxX = Math.min(width - 1, maxX + 5);
    actualStartY = Math.max(0, actualStartY - 2);
    actualEndY = Math.min(height - 1, actualEndY + 2);
    
    return {
        x: minX,
        y: actualStartY,
        width: maxX - minX + 1,
        height: actualEndY - actualStartY + 1
    };
}

async function findTextLines(canvas, imageData) {
    const lines = [];
    const width = canvas.width;
    const height = canvas.height;
    const data = imageData.data;
    
    // Ищем строки по горизонтальным проекциям
    const rowCounts = new Array(height).fill(0);
    
    // Считаем черные пиксели в каждой строке
    for (let y = 0; y < height; y++) {
        for (let x = 0; x < width; x++) {
            const idx = (y * width + x) * 4;
            if (data[idx] === 0) { // Черный пиксель
                rowCounts[y]++;
            }
        }
    }
    
    console.log('📊 Анализ строк:', rowCounts.slice(0, 50)); // Первые 50 строк для отладки
    
    // Находим интервалы с текстом
    let inLine = false;
    let lineStart = 0;
    
    for (let y = 0; y < height; y++) {
        const hasText = rowCounts[y] > 10; // Минимум 10 черных пикселей в строке
        
        if (hasText && !inLine) {
            // Начало строки
            inLine = true;
            lineStart = y;
        } else if (!hasText && inLine) {
            // Конец строки
            inLine = false;
            const lineHeight = y - lineStart;
            
            if (lineHeight >= 15 && lineHeight <= 60) { // Разумная высота строки
                lines.push({
                    x: 0,
                    y: lineStart,
                    width: width,
                    height: lineHeight
                });
                console.log(`📝 Найдена строка: y=${lineStart}, h=${lineHeight}`);
            }
        }
    }
    
    // Обрабатываем последнюю строку если она не закончилась
    if (inLine) {
        const lineHeight = height - lineStart;
        if (lineHeight >= 15 && lineHeight <= 60) {
            lines.push({
                x: 0,
                y: lineStart,
                width: width,
                height: lineHeight
            });
            console.log(`📝 Найдена последняя строка: y=${lineStart}, h=${lineHeight}`);
        }
    }
    
    return lines;
}

function renderMultiPage() {
    const container = document.getElementById('multiQrContainer');
    container.innerHTML = '';
    
    const startIndex = currentMultiPage * ITEMS_PER_PAGE;
    const endIndex = Math.min(startIndex + ITEMS_PER_PAGE, multiCodes.length);
    
    for (let i = startIndex; i < endIndex; i++) {
        const code = multiCodes[i];
        const item = createMultiQrItem(code, i);
        container.appendChild(item);
    }
    
    // Обновляем информацию о странице
    const totalPages = Math.ceil(multiCodes.length / ITEMS_PER_PAGE);
    document.getElementById('multiPageInfo').textContent = `${currentMultiPage + 1}/${totalPages}`;
    
    // Обновляем состояние кнопок навигации
    document.getElementById('multiPrev').disabled = currentMultiPage === 0;
    document.getElementById('multiNext').disabled = currentMultiPage >= totalPages - 1;
}

function createMultiQrItem(code, index) {
    const item = document.createElement('div');
    item.className = 'multi-qr-item';
    item.onclick = (e) => {
        e.stopPropagation();
        openSingleQrViewer(code);
    };
    
    // Добавляем индекс
    const indexBadge = document.createElement('div');
    indexBadge.className = 'index-badge';
    indexBadge.textContent = index + 1;
    item.appendChild(indexBadge);
    
    const canvas = document.createElement('canvas');
    new QRious({
        element: canvas,
        value: code,
        size: 500 // Увеличиваем размер для больших прямоугольных QR
    });
    
    const codeText = document.createElement('div');
    codeText.className = 'code-text';
    codeText.textContent = code;
    
    item.appendChild(canvas);
    item.appendChild(codeText);
    
    return item;
}

function navigateMultiPage(direction) {
    const totalPages = Math.ceil(multiCodes.length / ITEMS_PER_PAGE);
    const newPage = currentMultiPage + direction;
    
    if (newPage >= 0 && newPage < totalPages) {
        currentMultiPage = newPage;
        renderMultiPage();
    }
}

function openSingleQrViewer(code) {
    // Создаем новое независимое окно для просмотра QR кодов
    createIndependentQrViewer(code);
}

function createIndependentQrViewer(initialCode) {
    // Находим индекс начального кода

        display: flex; align-items: center; justify-content: center;
        cursor: pointer;
    `;

        position: relative; display: flex; flex-direction: column; align-items: center;
        cursor: default;
        padding: 40px;
    `;
    innerContainer.onclick = (e) => e.stopPropagation();
    
    // Кнопка закрытия
    const closeBtn = document.createElement('button');
    closeBtn.style.cssText = `
        position: absolute; top: 20px; right: 20px;
        background: rgba(255,255,255,0.9); border: none;
        border-radius: 50%; width: 40px; height: 40px;
        font-size: 18px; cursor: pointer;
        transition: all 0.2s;
        box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        z-index: 10;
    `;
    closeBtn.textContent = '✕';
    closeBtn.onmouseenter = () => {
        closeBtn.style.background = 'white';
        closeBtn.style.transform = 'scale(1.1)';
    };
    closeBtn.onmouseleave = () => {
        closeBtn.style.background = 'rgba(255,255,255,0.9)';
        closeBtn.style.transform = 'scale(1)';
    };
    closeBtn.onclick = () => closeIndependentViewer();
    
    // Информация о текущем коде
    const counterInfo = document.createElement('div');
    counterInfo.style.cssText = `
        position: absolute; top: 20px; left: 20px;
        background: rgba(255,255,255,0.9); padding: 8px 15px;
        border-radius: 20px; font-size: 14px; font-weight: bold;
        color: #000;
    `;
    
    // Кнопки навигации
    const prevBtn = document.createElement('button');
    prevBtn.style.cssText = `
        position: absolute; left: 20px; top: 50%; transform: translateY(-50%);
        background: rgba(255,255,255,0.9); border: none;
        border-radius: 50%; width: 50px; height: 50px;
        font-size: 24px; cursor: pointer; transition: all 0.2s;
        box-shadow: 0 4px 15px rgba(0,0,0,0.3);
    `;
    prevBtn.textContent = '‹';
    prevBtn.onclick = (e) => {
        e.stopPropagation();
        navigateIndependent(-1);
    };
    prevBtn.onmouseenter = () => {
        prevBtn.style.background = 'white';
        prevBtn.style.transform = 'translateY(-50%) scale(1.1)';
    };
    prevBtn.onmouseleave = () => {
        prevBtn.style.background = 'rgba(255,255,255,0.9)';
        prevBtn.style.transform = 'translateY(-50%) scale(1)';
    };
    
    const nextBtn = document.createElement('button');
    nextBtn.style.cssText = `
        position: absolute; right: 20px; top: 50%; transform: translateY(-50%);
        background: rgba(255,255,255,0.9); border: none;
        border-radius: 50%; width: 50px; height: 50px;
        font-size: 24px; cursor: pointer; transition: all 0.2s;
        box-shadow: 0 4px 15px rgba(0,0,0,0.3);
    `;
    nextBtn.textContent = '›';
    nextBtn.onclick = (e) => {
        e.stopPropagation();
        navigateIndependent(1);
    };
    nextBtn.onmouseenter = () => {
        nextBtn.style.background = 'white';
        nextBtn.style.transform = 'translateY(-50%) scale(1.1)';
    };
    nextBtn.onmouseleave = () => {
        nextBtn.style.background = 'rgba(255,255,255,0.9)';
        nextBtn.style.transform = 'translateY(-50%) scale(1)';
    };
    
    // QR код контейнер
    const qrBox = document.createElement('div');
    qrBox.style.cssText = `
        background: white; padding: 20px; border-radius: 15px; text-align: center;
        box-shadow: 0 0 50px rgba(255,255,255,0.2);
    `;
    
    const qrCanvas = document.createElement('canvas');
    qrCanvas.id = 'independentQrCanvas';
    
    const codeText = document.createElement('div');
    codeText.id = 'independentCodeText';
    codeText.style.cssText = `
        margin-top: 15px;
        font-size: 60px;
        font-family: 'Courier New', monospace;
        font-weight: bold;
        color: #000;
        letter-spacing: 2px;
    `;
    
    // Собираем все вместе
    qrBox.appendChild(qrCanvas);
    qrBox.appendChild(codeText);
    innerContainer.appendChild(closeBtn);
    innerContainer.appendChild(counterInfo);
    innerContainer.appendChild(prevBtn);
    innerContainer.appendChild(nextBtn);
    innerContainer.appendChild(qrBox);
    viewerContainer.appendChild(innerContainer);
    
    // Добавляем на страницу
    document.body.appendChild(viewerContainer);
    
    // Функции для работы с окном
    let currentIdx = currentIndex;
    
    function updateViewer() {
        const code = multiCodes[currentIdx];
        new QRious({
            element: qrCanvas,
            value: code,
            size: 400
        });
        codeText.textContent = code;
        counterInfo.textContent = `${currentIdx + 1}/${multiCodes.length}`;
        
        // Обновляем состояние кнопок
        prevBtn.disabled = currentIdx === 0;
        nextBtn.disabled = currentIdx === multiCodes.length - 1;
        prevBtn.style.opacity = prevBtn.disabled ? '0.3' : '1';
        nextBtn.style.opacity = nextBtn.disabled ? '0.3' : '1';
    }
    
    function navigateIndependent(direction) {
        const newIdx = currentIdx + direction;
        if (newIdx >= 0 && newIdx < multiCodes.length) {
            currentIdx = newIdx;
            updateViewer();
        }
    }
    
    function closeIndependentViewer() {
        document.body.removeChild(viewerContainer);
    }
    
    // Закрытие при клике вне области
    viewerContainer.onclick = closeIndependentViewer;
    
    // Закрытие по ESC
    const escHandler = (e) => {
        if (e.key === 'Escape') {
            closeIndependentViewer();
            document.removeEventListener('keydown', escHandler);
        }
    };
    document.addEventListener('keydown', escHandler);
    
    // Навигация стрелками
    const arrowHandler = (e) => {
        if (e.key === 'ArrowLeft') {
            navigateIndependent(-1);
        } else if (e.key === 'ArrowRight') {
            navigateIndependent(1);
        }
    };
    document.addEventListener('keydown', arrowHandler);
    
    // Удаляем обработчики при закрытии
    const originalClose = closeIndependentViewer;
    closeIndependentViewer = () => {
        document.removeEventListener('keydown', escHandler);
        document.removeEventListener('keydown', arrowHandler);
        originalClose();
    };
    
    // Инициализация
    updateViewer();
}
