        item.onclick = () => {
            // При клике показываем одиночный просмотр
            openSingleQrViewer(code);
        };
        
        item.onmouseenter = () => {
            item.style.transform = 'scale(1.08) translateY(-8px)';
            item.style.boxShadow = '0 20px 50px rgba(0,0,0,0.6)';
            item.style.borderColor = '#4ade80';
            item.style.background = 'linear-gradient(145deg, #ffffff 0%, #f0fdf4 100%)';
        };
        
        item.onmouseleave = () => {
            item.style.transform = 'scale(1)';
            item.style.boxShadow = '0 12px 35px rgba(0,0,0,0.4)';
            item.style.borderColor = 'transparent';
            item.style.background = 'white';
        };
        
        // Индекс
        const indexBadge = document.createElement('div');
        indexBadge.style.cssText = `
            position: absolute; top: 10px; left: 10px;
            background: #4ade80; color: white;
            font-size: 14px; font-weight: bold;
            padding: 6px 10px; border-radius: 25px;
            box-shadow: 0 3px 12px rgba(74,222,128,0.5);
        `;
        indexBadge.textContent = index + 1;
        item.appendChild(indexBadge);
        
        // QR код
        const canvas = document.createElement('canvas');
        new QRious({
            element: canvas,
            value: code,
            size: 300 /* Увеличиваем размер */
        });
        canvas.style.cssText = `
            width: 100%; height: 100%; 
            border-radius: 15px;
            box-shadow: 0 6px 20px rgba(0,0,0,0.2);
        `;
        item.appendChild(canvas);
        
        // Текст кода
        const codeText = document.createElement('div');
        codeText.style.cssText = `
            margin-top: 15px; font-size: 18px; font-weight: bold;
            color: #000; font-family: 'Courier New', monospace;
            letter-spacing: 1.2px;
            word-break: break-all;
            line-height: 1.3;
        `;
        codeText.textContent = code;
        item.appendChild(codeText);
        
        grid.appendChild(item);
    });
    
    // Кнопка закрытия
    const closeBtn = document.createElement('button');
    closeBtn.style.cssText = `
        position: fixed; top: 30px; right: 30px;
        background: linear-gradient(135deg, #22c55e, #16a34a);
        color: white; border: none;
        border-radius: 50%; width: 60px; height: 60px;
        font-size: 20px; cursor: pointer;
        transition: all 0.3s ease;
        box-shadow: 0 8px 25px rgba(34,197,94,0.4);
        z-index: 1000;
    `;
    closeBtn.textContent = '✕';
    closeBtn.onclick = () => {
        document.body.removeChild(container);
    };
    
    container.appendChild(grid);
    container.appendChild(closeBtn);
    document.body.appendChild(container);
    
    // Закрытие при клике вне области
    container.onclick = (e) => {
        if (e.target === container) {
            document.body.removeChild(container);
        }
    };
}

// Добавляем обработчики клавиш для навигации
document.addEventListener('keydown', (e) => {
    if (document.getElementById('multiQrOverlay').style.display === 'flex') {
        if (e.key === 'ArrowLeft') {
            navigateMultiPage(-1);
        } else if (e.key === 'ArrowRight') {
            navigateMultiPage(1);
        } else if (e.key === 'Escape') {
            closeMultiQrOverlay();
        }
    }
});

async function processRegionForCode(region) {
    const SCALE = 3; 
    previewCanvas.width = region.w * SCALE;
    previewCanvas.height = region.h * SCALE;
    
    pCtx.imageSmoothingEnabled = true;
    pCtx.drawImage(mainCanvas, region.x, region.y, region.w, region.h, 0, 0, previewCanvas.width, previewCanvas.height);
    
    const imageData = pCtx.getImageData(0, 0, previewCanvas.width, previewCanvas.height);
    const data = imageData.data;
    for (let i = 0; i < data.length; i += 4) {
        const brightness = (data[i] + data[i+1] + data[i+2]) / 3;
        const val = brightness < HARDCODED_THRESHOLD ? 0 : 255;
        data[i] = val; data[i+1] = val; data[i+2] = val;
    }
    pCtx.putImageData(imageData, 0, 0);

    try {
        const ocrLang = ocrLangMap[currentLang] || 'pol';
        const result = await Tesseract.recognize(
            previewCanvas,
            ocrLang,
            { tessedit_char_whitelist: '0123456789' }
        );
        
        const cleanText = result.data.text.replace(/\D/g, '').trim();
        return cleanText.length > 0 ? cleanText : null;
    } catch (err) {
        console.error(err);
        return null;
    }
}

/* ══════════════════════════════════════════════
   PRZECHWYTYWANIE EKRANU
══════════════════════════════════════════════ */
async function startCapture() {
    try {
        let captureController;
        if ('CaptureController' in window) {
            captureController = new CaptureController();
            captureController.setFocusBehavior("no-focus-change");
        }
        const options = { video: { cursor: 'always', displaySurface: 'window' }, audio: false };
        if (captureController) options.controller = captureController;

        activeStream = await navigator.mediaDevices.getDisplayMedia(options);
        const track = activeStream.getVideoTracks()[0];
        saveStoredWindow(track.label || '');
        captureVideo.srcObject = activeStream;
        await new Promise(r => captureVideo.onloadedmetadata = r);
        mainCanvas.width  = captureVideo.videoWidth;
        mainCanvas.height = captureVideo.videoHeight;
        captureVideo.play();
        drawVideoFrame();
        startScreen.style.display  = 'none';
        workControls.style.display = 'flex';
        setStatus('statusReady');
        loadStoredRegion();
        initMultiMode(); // Инициализация мультирежима
        updateWorkModeToggle(); // Обновляем быстрый тумблер
        
        // Автоматический запуск если есть сохраненная область для текущего режима
        if (storedRegion) {
            console.log('🚀 Автоматический запуск обработки сохраненной области...');
            // Запускаем сразу без задержки
            if (isMultiMode) {
                processMultiRegionAsLines(storedRegion);
            } else {
                autoRunSavedRegion();
            }
        }
        activeStream.getVideoTracks()[0].addEventListener('ended', () => {
            stopVideoStream(); setStatus('statusSelectNew');
        });
    } catch(err) { console.warn('Capture cancelled:', err); }
}

function drawVideoFrame() {
    if (!activeStream) return;
    if (captureVideo.readyState >= 2) {
        if (!isDrawing) {
            ctx.drawImage(captureVideo, 0, 0);
        }
    }
    requestAnimationFrame(drawVideoFrame);
}

async function doQuickCapture() {
    if (isCapturing || isProcessing) return;
    closeHistViewer();
    qrOverlay.style.display = 'none';
    if (activeStream && storedRegion) { await processRegion(storedRegion); return; }
    if (activeStream) { setStatus('statusReady'); return; }
    await startCapture();
    if (activeStream && storedRegion) await processRegion(storedRegion);
}

async function autoRunSavedRegion() {
    if (!storedRegion) return;
    const R = storedRegion;
    if (R.x + R.w > mainCanvas.width || R.y + R.h > mainCanvas.height) {
        setStatus('statusAutoError'); storedRegion = null; return;
    }
    setStatus('statusAutoInit');
    
    // Создаем специальное событие для автоматического запуска
    const mouseUpEvent = new MouseEvent('mouseup', {
        bubbles: true,
        cancelable: true,
        detail: 'autoRun' // Маркер автоматического запуска
    });
    
    // Отправляем событие на canvas
    mainCanvas.dispatchEvent(mouseUpEvent);
    
    await processRegion(R);
}

function handleFile(e) {
    const file = e.target.files[0]; if (!file) return;
    const url = URL.createObjectURL(file);
    const img = new Image();
    img.onload = () => {
        mainCanvas.width = img.width; mainCanvas.height = img.height;
        ctx.drawImage(img, 0, 0);
        mainCanvas.dataset.hasImage = '1'; stopVideoStream();
        startScreen.style.display = 'none'; workControls.style.display = 'flex';
        setStatus('statusReady'); loadStoredRegion(); URL.revokeObjectURL(url);
    };
    img.src = url;
}

/* ══════════════════════════════════════════════
   OCR
══════════════════════════════════════════════ */
async function processRegion(r) {
    if (isProcessing) return;
    isProcessing = true; setStatus('statusProcessing');
    if (activeStream && captureVideo.readyState >= 2) ctx.drawImage(captureVideo, 0, 0);
    previewCanvas.width = r.w; previewCanvas.height = r.h;
    pCtx.drawImage(mainCanvas, r.x, r.y, r.w, r.h, 0, 0, r.w, r.h);
    const raw = pCtx.getImageData(0, 0, r.w, r.h);
    pCtx.putImageData(toBlackWhite(raw, HARDCODED_THRESHOLD), 0, 0);
    try {
        const result = await Tesseract.recognize(previewCanvas, ocrLangMap[currentLang] || 'eng',
            { tessedit_char_whitelist: '0123456789' });
        const digits = (result.data.text || '').replace(/\D/g, '').trim();
        if (digits.length >= 4) { setStatus('statusDone'); showOverlay(digits); }
        else { setStatus('statusFail'); }
    } catch(err) { console.error('OCR error:', err); setStatus('statusFail'); }
    isProcessing = false;
}

function toBlackWhite(imgData, threshold) {
    const d = new Uint8ClampedArray(imgData.data);
    for (let i = 0; i < d.length; i += 4) {
        const v = (0.299*d[i] + 0.587*d[i+1] + 0.114*d[i+2]) > threshold ? 255 : 0;
        d[i] = d[i+1] = d[i+2] = v;
    }
    return new ImageData(d, imgData.width, imgData.height);
}

/* ══════════════════════════════════════════════
   HISTORIA – SIDEBAR
══════════════════════════════════════════════ */
const scansHistory = [];

function addToHistory(code) {
    scansHistory.unshift(code);
    if (scansHistory.length > 30) scansHistory.pop();
    renderSidebar();
}

function renderSidebar() {
    qhList.innerHTML = '';
    const toShow = scansHistory.slice(1);
    if (!toShow.length) { 
        qhSidebar.classList.remove('visible'); 
        return; 
    }
    toShow.forEach((code, i) => {
        const realIdx = i + 1;
        const card = document.createElement('div');
        card.className = 'qh-card'; card.dataset.idx = realIdx;
        const cvs = document.createElement('canvas');
        new QRious({ element: cvs, value: code, size: 100, background:'#fff', foreground:'#000' });
        const img = document.createElement('img'); img.src = cvs.toDataURL();
        const label = document.createElement('div');
        label.className = 'qh-card-code'; label.textContent = code;
        card.appendChild(img); card.appendChild(label);
        card.addEventListener('click', e => { e.stopPropagation(); openHistViewer(realIdx); });
        qhList.appendChild(card);
    });
    if (isHistoryVisible) qhSidebar.classList.add('visible');
}

function highlightSidebarCard(idx) {
    document.querySelectorAll('.qh-card').forEach(c => {
        c.classList.toggle('active', parseInt(c.dataset.idx) === idx);
    });
}

/* ══════════════════════════════════════════════
   QR OVERLAY
══════════════════════════════════════════════ */
const bigQrCanvas  = document.getElementById('bigQrCanvas');
const overlayTextEl = document.getElementById('overlayText');

function showOverlay(code) {
    overlayTextEl.textContent = code;
    new QRious({ element: bigQrCanvas, value: code, size: 400, background:'#fff', foreground:'#000' });
    addToHistory(code);
    qrOverlay.style.display = 'flex';
}

function closeOverlay() {
    if (!histViewer.classList.contains('hidden')) { closeHistViewer(); return; }
    qrOverlay.style.display = 'none';
    setStatus('statusReady');
}

/* ══════════════════════════════════════════════
   HISTORY VIEWER (modal)
══════════════════════════════════════════════ */
const histViewer = document.getElementById('histViewer');
const hvCanvas   = document.getElementById('hvCanvas');
const hvCode     = document.getElementById('hvCode');
const hvCounter  = document.getElementById('hvCounter');
const hvPrev     = document.getElementById('hvPrev');
const hvNext     = document.getElementById('hvNext');
const hvClose    = document.getElementById('hvClose');
const hvBg       = document.getElementById('hvBg');
let hvIndex = 0;

function openHistViewer(idx) {
    if (!scansHistory.length) return;
    hvIndex = Math.max(0, Math.min(idx, scansHistory.length - 1));
    renderHistViewer();
    histViewer.classList.remove('hidden');
}
function closeHistViewer() {
    histViewer.classList.add('hidden');
    highlightSidebarCard(-1);
}
function renderHistViewer() {
    const code = scansHistory[hvIndex];
    hvCode.textContent = code;
    new QRious({ element: hvCanvas, value: code, size: 300, background:'#fff', foreground:'#000' });
    hvCounter.textContent = `${hvIndex + 1} / ${scansHistory.length}`;
    hvPrev.disabled = hvIndex <= 0;
    hvNext.disabled = hvIndex >= scansHistory.length - 1;
    highlightSidebarCard(hvIndex);
}
hvPrev.addEventListener('click', e => { e.stopPropagation(); if (hvIndex > 0) { hvIndex--; renderHistViewer(); } });
hvNext.addEventListener('click', e => { e.stopPropagation(); if (hvIndex < scansHistory.length - 1) { hvIndex++; renderHistViewer(); } });
hvClose.addEventListener('click', e => { e.stopPropagation(); closeHistViewer(); });
hvBg.addEventListener('click', closeHistViewer);
document.querySelector('.hv-wrap').addEventListener('click', e => e.stopPropagation());

/* ══════════════════════════════════════════════
   KLAWIATURA
══════════════════════════════════════════════ */
document.addEventListener('keydown', e => {
    if (!histViewer.classList.contains('hidden')) {
        if (e.key === 'ArrowLeft')  { e.preventDefault(); if (hvIndex > 0) { hvIndex--; renderHistViewer(); } }
        if (e.key === 'ArrowRight') { e.preventDefault(); if (hvIndex < scansHistory.length - 1) { hvIndex++; renderHistViewer(); } }
        if (e.key === 'Escape') closeHistViewer();
        return;
    }
    if (qrOverlay.style.display === 'flex') {
        if (e.key === ' ' || e.key === 'Spacebar') { e.preventDefault(); doQuickCapture(); }
        if (e.key === 'Escape') closeOverlay();
        // Klawisz H - przełączanie paska historii
        if (e.key === 'h' || e.key === 'H' || e.key === 'р' || e.key === 'Р') { e.preventDefault(); toggleHistorySidebar(); }
    }
});

/* ══════════════════════════════════════════════
   INIT
══════════════════════════════════════════════ */
initMode();
initTheme();
initHistoryState();
loadStoredRegion(); // Загружаем координаты ПЕРЕД инициализацией режима
loadStoredWindow();
applyTranslations();
initMultiMode(); // Затем инициализируем режим и обновляем координаты
</script>
