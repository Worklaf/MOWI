<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OCR: MAX QR</title>
    <link rel="icon" type="image/svg+xml" href="mowi-favicon.svg">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flag-icons@7.2.3/css/flag-icons.min.css">
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrious/4.0.2/qrious.min.js"></script>
    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            background: #121212;
            color: #eee;
            margin: 0;
            padding: 0;
            height: 100vh;
            overflow: hidden;
            position: relative;
        }

        /* Переключатель режимов */
        #modeSwitcher {
            position: absolute;
            top: 20px;
            left: 20px;
            background: rgba(31,31,31,0.9);
            padding: 10px 16px;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.6);
            display: flex;
            align-items: center;
            gap: 10px;
            z-index: 150;
            font-size: 14px;
        }

        .switch {
            position: relative;
            display: inline-block;
            width: 50px;
            height: 26px;
        }

        .switch input {
            opacity: 0;
            width: 0;
            height: 0;
        }

        .slider {
            position: absolute;
            cursor: pointer;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: #dc2626;
            transition: .4s;
            border-radius: 34px;
        }

        .slider:before {
            position: absolute;
            content: "";
            height: 18px;
            width: 18px;
            left: 4px;
            bottom: 4px;
            background-color: white;
            transition: .4s;
            border-radius: 50%;
        }

        input:checked + .slider {
            background-color: #16a34a;
        }

        input:checked + .slider:before {
            transform: translateX(24px);
        }

        .mode-label {
            font-weight: 600;
            font-size: 13px;
        }

        .mode-label.on { color: #4ade80; }
        .mode-label.off { color: #f87171; }

        #languageSwitcher {
            position: absolute;
            top: 20px;
            left: 200px;
            background: rgba(31,31,31,0.9);
            padding: 10px 14px;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.6);
            display: flex;
            align-items: center;
            gap: 8px;
            z-index: 150;
            font-size: 14px;
        }

        #languageSwitcher .flag-icon {
            font-size: 22px;
            line-height: 1;
        }

        #languageSwitcher select {
            background: #2563eb;
            color: white;
            border: none;
            border-radius: 8px;
            padding: 6px 10px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            outline: none;
            box-shadow: 0 4px 12px rgba(37,99,235,0.35);
        }

        #languageSwitcher select:hover { background: #1d4ed8; }

        @media (max-width: 700px) {
            #modeSwitcher { 
                top: 10px; 
                left: 50%; 
                transform: translateX(-50%);
            }
            #languageSwitcher { 
                top: 60px; 
                left: 50%; 
                transform: translateX(-50%);
            }
        }

        #startScreen {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            background: #1f1f1f;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.7);
            text-align: center;
            display: flex;
            flex-direction: column;
            gap: 20px;
            z-index: 100;
        }

        h1 { margin: 0 0 10px 0; font-size: 24px; color: #fff; }
        p { margin: 0 0 20px 0; color: #888; }

        .btn-big {
            padding: 15px 30px;
            font-size: 18px;
            cursor: pointer;
            border: none;
            border-radius: 8px;
            font-weight: bold;
            color: white;
            transition: transform 0.1s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }
        .btn-big:active { transform: scale(0.98); }
        .btn-blue { background: #2563eb; }
        .btn-blue:hover { background: #1d4ed8; }
        .btn-green { background: #16a34a; }
        .btn-green:hover { background: #15803d; }
        
        #workControls {
            position: absolute;
            top: 20px; right: 20px;
            display: none;
            z-index: 50;
            gap: 10px;
            align-items: center;
        }
        
        .btn-small {
            padding: 8px 15px;
            cursor: pointer;
            border: none;
            border-radius: 4px;
            background: #dc2626;
            color: white;
            font-weight: bold;
            box-shadow: 0 4px 10px rgba(0,0,0,0.5);
        }

        .btn-ghost {
            padding: 8px 14px;
            cursor: pointer;
            border: 1px solid rgba(255,255,255,0.35);
            border-radius: 6px;
            background: rgba(15,15,15,0.65);
            color: #f8fafc;
            font-weight: 600;
            box-shadow: 0 6px 18px rgba(0,0,0,0.45);
        }

        .canvas-container {
            width: 100%; height: 100%;
            overflow: auto;
            background: #000;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        
        #mainCanvas { 
            box-shadow: 0 0 50px #000; 
            cursor: crosshair;
        }

        #qrOverlay {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.95);
            z-index: 9999;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            cursor: pointer;
        }

        .qr-container {
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        #captureBtnOverlay {
            position: absolute;
            top: -60px;
            left: 50%;
            transform: translateX(-50%);
            padding: 12px 24px;
            font-size: 16px;
            font-weight: bold;
            background: linear-gradient(135deg, #f59e0b, #d97706);
            color: white;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            box-shadow: 0 8px 25px rgba(245, 158, 11, 0.4);
            display: flex;
            align-items: center;
            gap: 10px;
            transition: all 0.2s;
            z-index: 10000;
            white-space: nowrap;
        }
        #captureBtnOverlay:hover {
            transform: translateX(-50%) scale(1.05);
            box-shadow: 0 12px 35px rgba(245, 158, 11, 0.5);
        }
        #captureBtnOverlay:active {
            transform: translateX(-50%) scale(0.98);
        }

        .qr-box {
            background: white;
            padding: 20px;
            border-radius: 15px;
            text-align: center;
            box-shadow: 0 0 50px rgba(255, 255, 255, 0.2);
        }
        #overlayText {
            margin-top: 15px;
            font-size: 60px;
            font-family: 'Courier New', monospace;
            font-weight: bold;
            color: #000;
            letter-spacing: 2px;
        }
        #hint { margin-top: 20px; color: #888; font-size: 18px; }
        #spaceHint { margin-top: 10px; color: #4ade80; font-size: 14px; }
        
        #hiddenPreview { display: none; }

        #coordsDisplay, #windowNameDisplay {
            font-family: 'JetBrains Mono', 'Courier New', monospace;
            font-size: 13px;
            letter-spacing: 0.5px;
            background: rgba(15, 23, 42, 0.8);
            padding: 8px 12px;
            border-radius: 8px;
            color: #cbd5f5;
            border: 1px solid rgba(96,165,250,0.35);
            box-shadow: 0 6px 18px rgba(37,99,235,0.25);
        }

        #windowNameDisplay {
            font-size: 12px;
            background: rgba(22, 163, 74, 0.2);
            color: #86efac;
            border: 1px solid rgba(34, 197, 94, 0.35);
            max-width: 200px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        #captureVideo {
            display: none;
        }
    </style>
</head>
<body>

    <!-- Переключатель режимов -->
    <div id="modeSwitcher">
        <span id="modeLabelOff" class="mode-label off">📺</span>
        <label class="switch">
            <input type="checkbox" id="modeToggle">
            <span class="slider"></span>
        </label>
        <span id="modeLabelOn" class="mode-label on">🔴</span>
    </div>

    <div id="languageSwitcher">
        <span id="currentFlag" class="fi fi-pl"></span>
        <select id="langSelect">
            <option value="pl" data-flag="fi fi-pl">Polski</option>
            <option value="uk" data-flag="fi fi-ua">Українська</option>
            <option value="en" data-flag="fi fi-gb">English</option>
        </select>
    </div>

    <div id="startScreen">
        <h1 id="startTitle">MAX QR READER</h1>
        <p id="startSubtitle">Wybierz źródło obrazu</p>
        
        <button id="captureBtn" class="btn-big btn-blue" onclick="startCapture()">
            📸 PRZECHWYĆ OKNO
        </button>
        
        <button id="fileBtn" class="btn-big btn-blue" style="background:#4b5563" onclick="document.getElementById('fileIn').click()">
            📂 OTWÓRZ PLIK
        </button>
        
        <button id="cardsBtn" class="btn-big btn-green" onclick="window.location.href='https://worklaf.github.io/MOWI/QR_Cards.html'">
            🃏 KARTY QR
        </button>
        
        <input type="file" id="fileIn" hidden onchange="handleFile(event)">
    </div>

    <div id="workControls">
        <span id="statusText" style="font-weight:bold; text-shadow:1px 1px 2px black;">Zaznacz obszar</span>
        <span id="coordsDisplay">x: — | y: — | w: — | h: —</span>
        <span id="windowNameDisplay" style="display:none;">—</span>
        <button id="clearCoordsBtn" class="btn-ghost">🗑️ RESET</button>
        <button id="resetBtn" class="btn-small" onclick="location.reload()">🔄 RESET</button>
    </div>

    <div class="canvas-container">
        <canvas id="mainCanvas"></canvas>
    </div>

    <video id="captureVideo" autoplay playsinline></video>

    <div id="qrOverlay" onclick="closeOverlay()">
        <div class="qr-container">
            <button id="captureBtnOverlay" onclick="event.stopPropagation(); doQuickCapture();">
                📸 <span id="captureBtnText">NOWY ZRZUT</span>
            </button>
            
            <div class="qr-box" onclick="event.stopPropagation()">
                <canvas id="bigQrCanvas"></canvas>
                <div id="overlayText">000000</div>
            </div>
        </div>
        
        <div id="hint">Kliknij dowolne miejsce, aby zamknąć</div>
        <div id="spaceHint">Naciśnij SPACJĘ dla kolejnego zrzutu</div>
    </div>
    
    <canvas id="hiddenPreview"></canvas>

<script>
    const mainCanvas = document.getElementById('mainCanvas');
    const ctx = mainCanvas.getContext('2d');
    const previewCanvas = document.getElementById('hiddenPreview');
    const pCtx = previewCanvas.getContext('2d');
    
    const captureVideo = document.getElementById('captureVideo');
    let activeStream = null;
    let savedStreamId = null;
    
    const startScreen = document.getElementById('startScreen');
    const workControls = document.getElementById('workControls');
    const statusText = document.getElementById('statusText');

    // Элементы переключателя
    const modeToggle = document.getElementById('modeToggle');
    const modeLabelOn = document.getElementById('modeLabelOn');
    const modeLabelOff = document.getElementById('modeLabelOff');

    const langSelect = document.getElementById('langSelect');
    const currentFlag = document.getElementById('currentFlag');
    const startTitleEl = document.getElementById('startTitle');
    const startSubtitleEl = document.getElementById('startSubtitle');
    const captureBtn = document.getElementById('captureBtn');
    const fileBtn = document.getElementById('fileBtn');
    const cardsBtn = document.getElementById('cardsBtn');
    const resetBtn = document.getElementById('resetBtn');
    const overlayHintEl = document.getElementById('hint');
    const spaceHintEl = document.getElementById('spaceHint');
    const captureBtnOverlay = document.getElementById('captureBtnOverlay');
    const captureBtnText = document.getElementById('captureBtnText');
    const coordsDisplay = document.getElementById('coordsDisplay');
    const clearCoordsBtn = document.getElementById('clearCoordsBtn');
    const windowNameDisplay = document.getElementById('windowNameDisplay');
    const htmlElement = document.documentElement;

    let isDrawing = false;
    let startX, startY;
    let imgDataSnapshot;
    let storedRegion = null;
    let lastWindowName = null;
    let isCapturing = false;
    let isProcessing = false;
    let isVideoMode = false; // true = автоподключение, false = ручной выбор
    
    const HARDCODED_THRESHOLD = 210; 
    const STORAGE_KEY = 'maxqr_savedRegion';
    const STORAGE_KEY_WINDOW = 'maxqr_savedWindow';
    const STORAGE_KEY_MODE = 'maxqr_videoMode';

    const translations = {
        pl: {
            startTitle: 'MAX QR READER',
            startSubtitle: 'Wybierz źródło obrazu',
            captureWindowBtn: '📸 PRZECHWYĆ OKNO',
            openFileBtn: '📂 OTWÓRZ PLIK',
            cardsBtn: '🃏 KARTY QR',
            resetBtn: '🔄 RESET',
            statusReady: 'Zaznacz obszar',
            statusProcessing: '⚡ Przetwarzanie...',
            statusDone: 'Gotowe!',
            statusFail: 'Nic nie znaleziono. Spróbuj ponownie.',
            overlayHint: 'Kliknij dowolne miejsce, aby zamknąć',
            overlayReady: 'Gotowy na kolejne zaznaczenie',
            statusAutoInit: 'Automatyczne przetwarzanie zapisanego obszaru…',
            statusAutoError: 'Zapisany obszar poza kadrem. Zaznacz ponownie.',
            statusCoordsCleared: 'Współrzędne wyzerowane.',
            clearCoordsBtn: '🗑️ RESET',
            spaceHint: 'Naciśnij SPACJĘ dla kolejnego zrzutu',
            captureBtnText: 'NOWY ZRZUT',
            statusReconnecting: '🔄 Próba połączenia z ostatnim oknem...',
            statusSelectNew: '⚠️ Wybierz okno ponownie',
            statusVideoOn: 'AUTO',
            statusVideoOff: 'MANUAL'
        },
        uk: {
            startTitle: 'MAX QR READER',
            startSubtitle: 'Виберіть джерело зображення',
            captureWindowBtn: '📸 ЗАХОПИТИ ВІКНО',
            openFileBtn: '📂 ВІДКРИТИ ФАЙЛ',
            cardsBtn: '🃏 QR КАРТКИ',
            resetBtn: '🔄 СКИНУТИ',
            statusReady: 'Виділіть область',
            statusProcessing: '⚡ Обробка...',
            statusDone: 'Готово!',
            statusFail: 'Нічого не знайдено. Спробуйте ще раз.',
            overlayHint: 'Клікніть будь-де, щоб закрити',
            overlayReady: 'Готовий до нового виділення',
            statusAutoInit: 'Автообробка збереженої зони…',
            statusAutoError: 'Збережена зона поза кадром. Виділіть знову.',
            statusCoordsCleared: 'Координати скинуті.',
            clearCoordsBtn: '🗑️ СКИНУТИ',
            spaceHint: 'Натисніть ПРОБІЛ для наступного знімка',
            captureBtnText: 'НОВИЙ ЗНІМОК',
            statusReconnecting: '🔄 Спроба з\'єднання з останнім вікном...',
            statusSelectNew: '⚠️ Виберіть вікно знову',
            statusVideoOn: 'АВТО',
            statusVideoOff: 'РУЧН'
        },
        en: {
            startTitle: 'MAX QR READER',
            startSubtitle: 'Select image source',
            captureWindowBtn: '📸 CAPTURE WINDOW',
            openFileBtn: '📂 OPEN FILE',
            cardsBtn: '🃏 QR CARDS',
            resetBtn: '🔄 RESET',
            statusReady: 'Select area',
            statusProcessing: '⚡ Processing...',
            statusDone: 'Done!',
            statusFail: 'Nothing found. Try again.',
            overlayHint: 'Click anywhere to close',
            overlayReady: 'Ready for next selection',
            statusAutoInit: 'Auto-processing saved area...',
            statusAutoError: 'Saved area out of frame. Select again.',
            statusCoordsCleared: 'Coordinates cleared.',
            clearCoordsBtn: '🗑️ CLEAR',
            spaceHint: 'Press SPACE for next capture',
            captureBtnText: 'NEW CAPTURE',
            statusReconnecting: '🔄 Trying to reconnect to last window...',
            statusSelectNew: '⚠️ Select window again',
            statusVideoOn: 'AUTO',
            statusVideoOff: 'MANUAL'
        }
    };

    const ocrLangMap = { pl: 'pol', uk: 'ukr', en: 'eng' };

    let currentLang = langSelect.value || 'pl';
    let currentStatusKey = 'statusReady';

    // ========== Переключатель режимов ==========
    function initMode() {
        const savedMode = localStorage.getItem(STORAGE_KEY_MODE);
        isVideoMode = savedMode === 'true';
        modeToggle.checked = isVideoMode;
        updateModeUI();
    }

    function updateModeUI() {
        if (isVideoMode) {
            modeLabelOn.classList.add('on');
            modeLabelOn.classList.remove('off');
            modeLabelOff.classList.add('off');
            modeLabelOff.classList.remove('on');
        } else {
            modeLabelOn.classList.add('off');
            modeLabelOn.classList.remove('on');
            modeLabelOff.classList.add('on');
            modeLabelOff.classList.remove('off');
        }
    }

    modeToggle.addEventListener('change', () => {
        isVideoMode = modeToggle.checked;
        localStorage.setItem(STORAGE_KEY_MODE, isVideoMode);
        updateModeUI();
        
        // Если выключили - останавливаем стрим
        if (!isVideoMode && activeStream) {
            stopVideoStream();
        }
    });

    function stopVideoStream() {
        if (activeStream) {
            activeStream.getTracks().forEach(t => t.stop());
            activeStream = null;
        }
        captureVideo.srcObject = null;
    }

    function t(key) {
        return (translations[currentLang] && translations[currentLang][key]) ? translations[currentLang][key] : key;
    }

    function refreshStatus() {
        statusText.innerText = t(currentStatusKey);
    }

    function applyTranslations() {
        startTitleEl.innerText = t('startTitle');
        startSubtitleEl.innerText = t('startSubtitle');
        captureBtn.innerText = t('captureWindowBtn');
        fileBtn.innerText = t('openFileBtn');
        cardsBtn.innerText = t('cardsBtn');
        resetBtn.innerText = t('resetBtn');
        overlayHintEl.innerText = t('overlayHint');
        spaceHintEl.innerText = t('spaceHint');
        clearCoordsBtn.innerText = t('clearCoordsBtn');
        captureBtnText.innerText = t('captureBtnText');
        refreshStatus();
        updateCoordsDisplay(storedRegion);
    }

    function setStatus(key) {
        currentStatusKey = key;
        refreshStatus();
    }

    langSelect.addEventListener('change', () => {
        currentLang = langSelect.value;
        htmlElement.lang = currentLang;
        const selectedOption = langSelect.options[langSelect.selectedIndex];
        const newFlagClass = selectedOption.getAttribute('data-flag');
        currentFlag.className = newFlagClass;
        applyTranslations();
    });

    (function initFlag() {
        const selectedOption = langSelect.options[langSelect.selectedIndex];
        if (selectedOption && selectedOption.dataset.flag) {
            currentFlag.className = selectedOption.dataset.flag;
        }
    })();

    htmlElement.lang = currentLang;
    applyTranslations();
    initMode();
    loadStoredRegion();
    loadStoredWindow();

    function loadStoredWindow() {
        try {
            const raw = localStorage.getItem(STORAGE_KEY_WINDOW);
            if (raw) {
                const parsed = JSON.parse(raw);
                lastWindowName = parsed.name || null;
                savedStreamId = parsed.streamId || null;
                updateWindowDisplay();
            }
        } catch (err) { lastWindowName = null; savedStreamId = null; }
    }

    function storeWindowInfo(name, streamId) {
        lastWindowName = name;
        savedStreamId = streamId;
        try {
            localStorage.setItem(STORAGE_KEY_WINDOW, JSON.stringify({
                name: name,
                streamId: streamId,
                timestamp: Date.now()
            }));
        } catch (err) {}
        updateWindowDisplay();
    }

    function updateWindowDisplay() {
        if (lastWindowName) {
            windowNameDisplay.textContent = `🖥️ ${lastWindowName}`;
            windowNameDisplay.style.display = 'inline-block';
        } else {
            windowNameDisplay.style.display = 'none';
            windowNameDisplay.textContent = '—';
        }
    }

    function clearStoredWindow() {
        lastWindowName = null;
        savedStreamId = null;
        localStorage.removeItem(STORAGE_KEY_WINDOW);
        updateWindowDisplay();
    }

    function loadStoredRegion() {
        try {
            const raw = localStorage.getItem(STORAGE_KEY);
            if (!raw) { storedRegion = null; return; }
            const parsed = JSON.parse(raw);
            if (isFinite(parsed.x) && isFinite(parsed.y) && isFinite(parsed.w) && isFinite(parsed.h)) {
                storedRegion = parsed;
            } else { storedRegion = null; }
        } catch (err) { storedRegion = null; }
        updateCoordsDisplay(storedRegion);
    }

    function storeRegion(region) {
        storedRegion = {
            x: Math.round(region.x),
            y: Math.round(region.y),
            w: Math.round(region.w),
            h: Math.round(region.h)
        };
        try {
            localStorage.setItem(STORAGE_KEY, JSON.stringify(storedRegion));
        } catch (err) {}
        updateCoordsDisplay(storedRegion);
    }

    function clearStoredRegion() {
        storedRegion = null;
        localStorage.removeItem(STORAGE_KEY);
        updateCoordsDisplay(null);
        clearStoredWindow();
        setStatus('statusCoordsCleared');
    }

    function updateCoordsDisplay(region) {
        if (!region) {
            coordsDisplay.textContent = 'x: — | y: — | w: — | h: —';
            return;
        }
        coordsDisplay.textContent = `x: ${region.x} | y: ${region.y} | w: ${region.w} | h: ${region.h}`;
    }

    clearCoordsBtn.addEventListener('click', clearStoredRegion);

    function enterWorkMode() {
        startScreen.style.display = 'none';
        workControls.style.display = 'flex';
        if (!storedRegion) {
            setStatus('statusReady');
        }
    }

    function refreshCanvasFromVideo() {
        if (captureVideo.readyState >= 2 && mainCanvas.width > 0) {
            ctx.drawImage(captureVideo, 0, 0);
        }
    }

    function tryAutoProcessStoredRegion() {
        const sanitized = sanitizeRegion(storedRegion);
        if (!sanitized) { setStatus('statusAutoError'); return; }
        setStatus('statusAutoInit');
        processAndRecognize(sanitized);
    }

    function sanitizeRegion(region) {
        if (!region) return null;
        const canvasWidth = mainCanvas.width;
        const canvasHeight = mainCanvas.height;
        if (!canvasWidth || !canvasHeight) return null;

        const x = Math.max(0, Math.min(canvasWidth - 1, region.x));
        const y = Math.max(0, Math.min(canvasHeight - 1, region.y));
        const w = Math.max(0, Math.min(region.w, canvasWidth - x));
        const h = Math.max(0, Math.min(region.h, canvasHeight - y));

        if (w < 6 || h < 6) return null;
        return { x, y, w, h };
    }

    function showOverlay(text) {
        new QRious({
            element: document.getElementById('bigQrCanvas'),
            value: text,
            size: 400
        });
        document.getElementById('overlayText').innerText = text;
        document.getElementById('qrOverlay').style.display = 'flex';
    }

    function closeOverlay() {
        document.getElementById('qrOverlay').style.display = 'none';
        setStatus('overlayReady');
    }

    document.addEventListener('keydown', async (e) => {
        if (document.getElementById('qrOverlay').style.display === 'flex') {
            if (e.code === 'Space') {
                e.preventDefault();
                await doQuickCapture();
            } else if (e.code === 'Enter' || e.code === 'Escape') {
                closeOverlay();
            }
        }
    });

    // ========== ГЛАВНАЯ ФУНКЦИЯ: Перезахват ==========
    async function doQuickCapture() {
        if (isCapturing || isProcessing) return;
        
        isCapturing = true;
        closeOverlay();
        setStatus('statusProcessing');
        
        try {
            // Режим ON (видео): пробуем восстановить поток
            if (isVideoMode && savedStreamId) {
                // Если поток ещё жив
                if (activeStream && captureVideo.readyState >= 2) {
                    refreshCanvasFromVideo();
                    await processSavedRegion();
                    isCapturing = false;
                    return;
                }
                
                // Поток закрыт - пробуем переподключиться
                try {
                    setStatus('statusReconnecting');
                    const stream = await tryReconnectStream();
                    if (stream) {
                        await processStream(stream);
                        isCapturing = false;
                        return;
                    }
                } catch (e) {
                    console.log('Не удалось переподключиться:', e);
                }
            }
            
            // Режим OFF (ручной) или не удалось подключиться в режиме ON
            // -> делаем полный захват с выбором окна
            await doFullCapture();
            
        } catch(e) {
            console.error('Quick capture failed:', e);
            setStatus('statusFail');
        } finally {
            isCapturing = false;
        }
    }

    // Попытка переподключиться к последнему окну
    async function tryReconnectStream() {
    const controller = new CaptureController();
    // *** ФИКС: без этого браузер крадёт фокус при каждом переподключении ***
    if (typeof controller.setFocusBehavior === 'function') {
        controller.setFocusBehavior("no-focus-change");
    }
    const stream = await navigator.mediaDevices.getDisplayMedia({
        video: { cursor: "always", displaySurface: "window" },
        audio: false,
        controller: controller
    });
    return stream;
}
    async function processSavedRegion() {
        const sanitized = sanitizeRegion(storedRegion);
        if (sanitized) {
            await processAndRecognize(sanitized);
        } else {
            setStatus('statusAutoError');
        }
    }

    async function processStream(stream) {
    // *** ФИКС: если по какой-то причине старый стрим ещё жив — убиваем его ***
    if (activeStream && activeStream !== stream) {
        activeStream.getTracks().forEach(t => t.stop());
        activeStream = null;
        captureVideo.srcObject = null;
    }

    const videoTrack = stream.getVideoTracks()[0];
    const settings = videoTrack.getSettings();

    if (!lastWindowName || videoTrack.label !== lastWindowName) {
        storeWindowInfo(videoTrack.label, settings.deviceId || null);
    }

    try {
        captureVideo.srcObject = stream;
        await captureVideo.play();
        await new Promise(r => setTimeout(r, 200));

        activeStream = stream;

        videoTrack.onended = () => {
            activeStream = null;
        };

        mainCanvas.width = captureVideo.videoWidth;
        mainCanvas.height = captureVideo.videoHeight;
        ctx.drawImage(captureVideo, 0, 0);

        await processSavedRegion();
    } catch(e) {
        console.error('Video restore failed:', e);
        setStatus('statusFail');
    }
}

    // Полный захват с выбором окна
    async function doFullCapture() {
    try {
        // *** ФИКС: всегда останавливаем старый стрим перед новым захватом ***
        if (activeStream) {
            stopVideoStream();
        }

        const opts = { video: { cursor: "always" }, audio: false };
        if ("CaptureController" in window) {
            const controller = new CaptureController();
            controller.setFocusBehavior("no-focus-change");
            opts.controller = controller;
        }

        const stream = await navigator.mediaDevices.getDisplayMedia(opts);
        await processStream(stream);

    } catch(e) {
        console.error('Full capture failed:', e);
        setStatus('statusFail');
    }
}

    async function startCapture() {
        await doFullCapture();
        enterWorkMode();
    }

    function handleFile(e) {
        if(!e.target.files[0]) return;
        const img = new Image();
        img.onload = () => {
            mainCanvas.width = img.width;
            mainCanvas.height = img.height;
            ctx.drawImage(img, 0, 0);
            enterWorkMode();
            if (storedRegion) {
                setTimeout(() => tryAutoProcessStoredRegion(), 100);
            }
        };
        img.src = URL.createObjectURL(e.target.files[0]);
    }

    // Рисование области мышью
    mainCanvas.addEventListener('mousedown', e => {
        if (!mainCanvas.width || !mainCanvas.height) return;
        const rect = mainCanvas.getBoundingClientRect();
        const scaleX = mainCanvas.width / rect.width; 
        const scaleY = mainCanvas.height / rect.height;
        
        startX = (e.clientX - rect.left) * scaleX;
        startY = (e.clientY - rect.top) * scaleY;
        isDrawing = true;
        imgDataSnapshot = ctx.getImageData(0,0, mainCanvas.width, mainCanvas.height);
    });

    mainCanvas.addEventListener('mousemove', e => {
        if(!isDrawing) return;
        const rect = mainCanvas.getBoundingClientRect();
        const scaleX = mainCanvas.width / rect.width;
        const scaleY = mainCanvas.height / rect.height;
        
        const currentX = (e.clientX - rect.left) * scaleX;
        const currentY = (e.clientY - rect.top) * scaleY;
        
        ctx.putImageData(imgDataSnapshot, 0, 0);
        ctx.strokeStyle = '#facc15';
        ctx.lineWidth = 5;
        ctx.strokeRect(startX, startY, currentX - startX, currentY - startY);
    });

    mainCanvas.addEventListener('mouseup', e => {
        if(!isDrawing) return;
        isDrawing = false;
        
        const rect = mainCanvas.getBoundingClientRect();
        const scaleX = mainCanvas.width / rect.width;
        const scaleY = mainCanvas.height / rect.height;
        
        const endX = (e.clientX - rect.left) * scaleX;
        const endY = (e.clientY - rect.top) * scaleY;
        
        const w = Math.abs(endX - startX);
        const h = Math.abs(endY - startY);
        
        if (w > 5 && h > 5) {
            const region = { x: Math.min(startX, endX), y: Math.min(startY, endY), w, h };
            storeRegion(region);
            setStatus('statusProcessing');
            processAndRecognize(region);
        }
    });

    async function processAndRecognize(region) {
        isProcessing = true;
        
        const SCALE = 3; 
        previewCanvas.width = region.w * SCALE;
        previewCanvas.height = region.h * SCALE;
        
        pCtx.imageSmoothingEnabled = true;
        pCtx.drawImage(mainCanvas, region.x, region.y, region.w, region.h, 0, 0, previewCanvas.width, previewCanvas.height);
        
        const imageData = pCtx.getImageData(0, 0, previewCanvas.width, previewCanvas.height);
        const data = imageData.data;
        for (let i = 0; i < data.length; i += 4) {
            const brightness = (data[i] + data[i+1] + data[i+2]) / 3;
            const val = brightness < HARDCODED_THRESHOLD ? 0 : 255;
            data[i] = val; data[i+1] = val; data[i+2] = val;
        }
        pCtx.putImageData(imageData, 0, 0);

        try {
            const ocrLang = ocrLangMap[currentLang] || 'pol';
            const result = await Tesseract.recognize(
                previewCanvas,
                ocrLang,
                { tessedit_char_whitelist: '0123456789' }
            );
            
            const cleanText = result.data.text.replace(/\D/g, '').trim();
            
            if(cleanText.length > 0) {
                setStatus('statusDone');
                showOverlay(cleanText);
            } else {
                setStatus('statusFail');
            }

        } catch (err) {
            setStatus('statusFail');
            console.error(err);
        } finally {
            isProcessing = false;
        }
    }

    window.addEventListener('beforeunload', () => {
        if (activeStream) {
            activeStream.getTracks().forEach(t => t.stop());
        }
    });
</script>
