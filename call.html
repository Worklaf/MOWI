<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Мой Чат-Телефон</title>
    <!-- Используем стабильную версию SDK -->
    <script src="https://cdn.jsdelivr.net/npm/voximplant-websdk@latest/voximplant.min.js"></script>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; background: #f4f7f6; display: flex; justify-content: center; }
        .phone-box { background: white; padding: 20px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); width: 100%; max-width: 300px; }
        input, button { width: 100%; padding: 12px; margin: 8px 0; box-sizing: border-box; border-radius: 4px; font-size: 16px; }
        input { border: 1px solid #ccc; }
        button { background: #248855; color: white; cursor: pointer; font-weight: bold; border: none; }
        button:hover { background: #1e7046; }
        button:disabled { background: #cccccc; cursor: not-allowed; }
        #status { font-size: 0.9em; color: #666; text-align: center; margin-bottom: 10px; font-weight: bold; }
    </style>
</head>
<body>

<div class="phone-box">
    <h3>Личный Телефон</h3>
    <div id="status">Загрузка...</div>

    <input type="tel" id="phoneNumber" placeholder="+79991234567" value="+7">
    <button id="callBtn" onclick="startCall()" disabled>Позвонить</button>
    <button id="hangupBtn" onclick="hangupCall()" style="background:#cc3333; display:none;">Положить трубку</button>
</div>

<!-- Необходимый контейнер для аудио-элементов Voximplant -->
<div id="voximplant-container"></div>

<script>
    window.addEventListener('load', function() {
        if (typeof VoxImplant === 'undefined') {
            document.getElementById('status').innerText = "Ошибка: Библиотека не загрузилась";
            return;
        }

        const vox = VoxImplant.getInstance();
        const accountName = "worklaf.n8"; 
        const applicationName = "mychat";
        const username = "Liudmyla";
        const password = "aLsdP)8c"; 

        document.getElementById('status').innerText = "Подключение...";

        // Передаем обязательный параметр "node", чтобы исправить ошибку
        vox.init({ 
            micRequired: true,
            node: "voximplant-container"
        })
        .then(() => {
            document.getElementById('status').innerText = "Авторизация...";
            return vox.connect();
        })
        .then(() => {
            return vox.login(`${username}@${applicationName}.${accountName}.voximplant.com`, password);
        })
        .then(() => {
            document.getElementById('status').innerText = "Готов к звонку";
            document.getElementById('callBtn').disabled = false;
        })
        .catch((err) => {
            document.getElementById('status').innerText = "Ошибка: " + err.message;
        });

        window.voxInstance = vox;
    });

    function startCall() {
        if (!window.voxInstance) return;
        const number = document.getElementById('phoneNumber').value;
        document.getElementById('status').innerText = "Набираю...";
        
        const call = window.voxInstance.call({ number: number, video: false });
        window.currentCall = call;

        call.on(VoxImplant.CallEvents.Connected, () => {
            document.getElementById('status').innerText = "Разговор...";
            document.getElementById('callBtn').style.display = "none";
            document.getElementById('hangupBtn').style.display = "block";
        });

        call.on(VoxImplant.CallEvents.Failed, (e) => {
            document.getElementById('status').innerText = "Ошибка: " + e.reason;
            resetButtons();
        });

        call.on(VoxImplant.CallEvents.Disconnected, () => {
            document.getElementById('status').innerText = "Завершено";
            resetButtons();
        });
    }

    function hangupCall() {
        if (window.currentCall) window.currentCall.hangup();
    }

    function resetButtons() {
        document.getElementById('callBtn').style.display = "block";
        document.getElementById('hangupBtn').style.display = "none";
    }
</script>

</body>
</html>
