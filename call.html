<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Мой Чат-Телефон</title>
    <!-- ПОМЕНЯЛИ ССЫЛКУ НА НАДЕЖНЫЙ ОФИЦИАЛЬНЫЙ CDN VOXIMPLANT -->
    <script src="https://cdn.voximplant.com/edge/voximplant-websdk-releases/voximplant.min.js"></script>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; background: #f4f7f6; display: flex; justify-content: center; }
        .phone-box { background: white; padding: 20px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); width: 100%; max-width: 300px; }
        input, button { width: 100%; padding: 12px; margin: 8px 0; box-sizing: border-box; border-radius: 4px; font-size: 16px; }
        input { border: 1px solid #ccc; }
        button { background: #248855; color: white; cursor: pointer; font-weight: bold; border: none; }
        button:hover { background: #1e7046; }
        button:disabled { background: #cccccc; cursor: not-allowed; }
        #status { font-size: 0.9em; color: #666; text-align: center; margin-bottom: 10px; font-weight: bold; }
    </style>
</head>
<body>

<div class="phone-box">
    <h3>Личный Телефон</h3>
    <div id="status">Введите пароль пользователя Liudmyla:</div>
    
    <input type="password" id="voxPassword" placeholder="Пароль от Liudmyla">
    <button id="connectBtn" onclick="connectToVoximplant()">Подключиться к сети</button>

    <hr style="margin: 20px 0; border: 0; border-top: 1px solid #eee;">

    <input type="tel" id="phoneNumber" placeholder="+79991234567" value="+7">
    <button id="callBtn" onclick="startCall()" disabled>Позвонить</button>
    <button id="hangupBtn" onclick="hangupCall()" style="background:#cc3333; display:none;">Положить трубку</button>
</div>

<script>
    let vox = null;
    let currentCall = null;

    const accountName = "worklaf.n8"; 
    const applicationName = "mychat";
    const username = "Liudmyla";

    function connectToVoximplant() {
        const password = document.getElementById('voxPassword').value;
        if (!password) {
            alert("Пожалуйста, введите пароль!");
            return;
        }

        // Защита от падения, если библиотека не загрузилась
        if (typeof VoxImplant === 'undefined') {
            alert("Критическая ошибка: Браузер заблокировал загрузку библиотеки Voximplant. Попробуйте отключить встроенный блокировщик рекламы/щит в браузере.");
            document.getElementById('status').innerText = "Ошибка загрузки библиотеки SDK";
            return;
        }

        document.getElementById('status').innerText = "Подключение к сети...";
        document.getElementById('connectBtn').disabled = true;

        // Инициализируем только при нажатии
        vox = VoxImplant.getInstance();

        vox.init({ micRequired: true })
            .then(() => {
                document.getElementById('status').innerText = "Авторизация в Voximplant...";
                return vox.connect();
            })
            .then(() => {
                return vox.login(`${username}@${applicationName}.${accountName}.voximplant.com`, password);
            })
            .then(() => {
                document.getElementById('status').innerText = "Готов к звонку! Набирайте номер.";
                document.getElementById('callBtn').disabled = false;
                document.getElementById('voxPassword').style.display = "none";
                document.getElementById('connectBtn').style.display = "none";
            })
            .catch((err) => {
                document.getElementById('status').innerText = "Ошибка: " + err.message;
                document.getElementById('connectBtn').disabled = false;
            });
    }

    function startCall() {
        if (!vox) return;
        const number = document.getElementById('phoneNumber').value;
        document.getElementById('status').innerText = "Набираю " + number + "...";

        currentCall = vox.call({ number: number, video: false });

        currentCall.on(VoxImplant.CallEvents.Connected, () => {
            document.getElementById('status').innerText = "В эфире (Разговор)";
            document.getElementById('callBtn').style.display = "none";
            document.getElementById('hangupBtn').style.display = "block";
        });

        currentCall.on(VoxImplant.CallEvents.Failed, (e) => {
            document.getElementById('status').innerText = "Сброс: " + e.reason;
            resetButtons();
        });

        currentCall.on(VoxImplant.CallEvents.Disconnected, () => {
            document.getElementById('status').innerText = "Звонок завершен";
            resetButtons();
        });
    }

    function hangupCall() {
        if (currentCall) currentCall.hangup();
    }

    function resetButtons() {
        document.getElementById('callBtn').style.display = "block";
        document.getElementById('hangupBtn').style.display = "none";
    }
</script>

</body>
</html>
