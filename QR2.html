<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OCR: MAX QR</title>
    <link rel="icon" type="image/svg+xml" href="mowi-favicon.svg">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flag-icons@7.2.3/css/flag-icons.min.css">
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrious/4.0.2/qrious.min.js"></script>
    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            background: #121212;
            color: #eee;
            margin: 0; padding: 0;
            height: 100vh;
            overflow: hidden;
            position: relative;
        }

        #modeSwitcher {
            position: absolute; top: 20px; left: 20px;
            background: rgba(31,31,31,0.9);
            padding: 10px 16px; border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.6);
            display: flex; align-items: center; gap: 10px;
            z-index: 150; font-size: 14px;
        }
        .switch { position: relative; display: inline-block; width: 50px; height: 26px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider {
            position: absolute; cursor: pointer;
            top: 0; left: 0; right: 0; bottom: 0;
            background-color: #dc2626; transition: .4s; border-radius: 34px;
        }
        .slider:before {
            position: absolute; content: "";
            height: 18px; width: 18px; left: 4px; bottom: 4px;
            background-color: white; transition: .4s; border-radius: 50%;
        }
        input:checked + .slider { background-color: #16a34a; }
        input:checked + .slider:before { transform: translateX(24px); }
        .mode-label { font-weight: 600; font-size: 13px; }
        .mode-label.on { color: #4ade80; }
        .mode-label.off { color: #f87171; }

        #languageSwitcher {
            position: absolute; top: 20px; left: 200px;
            background: rgba(31,31,31,0.9);
            padding: 10px 14px; border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.6);
            display: flex; align-items: center; gap: 8px;
            z-index: 150; font-size: 14px;
        }
        #languageSwitcher .flag-icon { font-size: 22px; line-height: 1; }
        #languageSwitcher select {
            background: #2563eb; color: white; border: none;
            border-radius: 8px; padding: 6px 10px;
            font-size: 14px; font-weight: 600; cursor: pointer; outline: none;
        }
        #languageSwitcher select:hover { background: #1d4ed8; }

        @media (max-width: 700px) {
            #modeSwitcher { top: 10px; left: 50%; transform: translateX(-50%); }
            #languageSwitcher { top: 60px; left: 50%; transform: translateX(-50%); }
        }

        #startScreen {
            position: absolute; top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            background: #1f1f1f; padding: 40px; border-radius: 20px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.7);
            text-align: center; display: flex; flex-direction: column; gap: 20px;
            z-index: 100;
        }
        h1 { margin: 0 0 10px 0; font-size: 24px; color: #fff; }
        p  { margin: 0 0 20px 0; color: #888; }

        .btn-big {
            padding: 15px 30px; font-size: 18px; cursor: pointer;
            border: none; border-radius: 8px; font-weight: bold; color: white;
            transition: transform 0.1s;
            display: flex; align-items: center; justify-content: center; gap: 10px;
        }
        .btn-big:active { transform: scale(0.98); }
        .btn-blue { background: #2563eb; }
        .btn-blue:hover { background: #1d4ed8; }
        .btn-green { background: #16a34a; }
        .btn-green:hover { background: #15803d; }

        #workControls {
            position: absolute; top: 20px; right: 20px;
            display: none; z-index: 50; gap: 10px; align-items: center;
        }
        .btn-small {
            padding: 8px 15px; cursor: pointer; border: none;
            border-radius: 4px; background: #dc2626; color: white;
            font-weight: bold; box-shadow: 0 4px 10px rgba(0,0,0,0.5);
        }
        .btn-ghost {
            padding: 8px 14px; cursor: pointer;
            border: 1px solid rgba(255,255,255,0.35); border-radius: 6px;
            background: rgba(15,15,15,0.65); color: #f8fafc;
            font-weight: 600; box-shadow: 0 6px 18px rgba(0,0,0,0.45);
        }

        .canvas-container {
            width: 100%; height: 100%; overflow: auto; background: #000;
            display: flex; justify-content: center; align-items: center;
        }
        #mainCanvas { box-shadow: 0 0 50px #000; cursor: crosshair; }

        /* ══════════════════════════════════════
           QR OVERLAY — новая структура
        ══════════════════════════════════════ */
        #qrOverlay {
            display: none;
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.95);
            z-index: 9999;
            flex-direction: column;
            align-items: center;
            justify-content: space-between;
            cursor: pointer;
        }

        /* Тело: sidebar + центр */
        .qr-overlay-body {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 30px;
            padding: 60px 30px 10px;
            width: 100%;
            box-sizing: border-box;
            overflow: hidden;
        }

        /* ── Левая история (внутри оверлея) ── */
        #qhSidebar {
            display: none;               /* появляется со 2-го скана */
            flex-direction: column;
            width: 165px;
            max-height: 75vh;
            background: rgba(16,16,16,0.95);
            border: 1px solid #2a2a2a;
            border-radius: 14px;
            overflow: hidden;
            flex-shrink: 0;
            cursor: default;
        }

        .qh-header {
            padding: 8px 10px 6px;
            font-size: 10px; color: #555;
            text-transform: uppercase; letter-spacing: 1.2px;
            border-bottom: 1px solid #1e1e1e;
            text-align: center; flex-shrink: 0;
        }

        #qhList {
            overflow-y: auto;
            display: flex; flex-direction: column;
            gap: 8px; padding: 8px;
        }
        #qhList::-webkit-scrollbar { width: 4px; }
        #qhList::-webkit-scrollbar-track { background: #111; }
        #qhList::-webkit-scrollbar-thumb { background: #333; border-radius: 2px; }

        /* Карточка истории — белая, как QR-карточка */
        .qh-card {
            background: #fff;
            border: 3px solid transparent;
            border-radius: 10px;
            padding: 7px 7px 5px;
            cursor: pointer;
            transition: border-color 0.15s, transform 0.1s;
            text-align: center;
        }
        .qh-card:hover  { border-color: #44aaff; transform: scale(1.03); }
        .qh-card.active { border-color: #44aaff; }

        .qh-card img {
            width: 100%;
            aspect-ratio: 1 / 1;   /* полный QR, без обрезки */
            object-fit: contain;
            display: block;
            border-radius: 4px;
        }
        .qh-card-code {
            font-size: 10px; color: #222;
            margin-top: 4px;
            font-family: 'Courier New', monospace;
            font-weight: bold; letter-spacing: 1px;
        }

        /* ── Центральный QR ── */
        .qr-center {
            display: flex; flex-direction: column;
            align-items: center;
            cursor: default;
        }

        .qr-container {
            position: relative;
            display: flex; flex-direction: column; align-items: center;
        }

        #captureBtnOverlay {
            position: absolute; top: -60px; left: 50%;
            transform: translateX(-50%);
            padding: 12px 24px; font-size: 16px; font-weight: bold;
            background: linear-gradient(135deg, #f59e0b, #d97706);
            color: white; border: none; border-radius: 12px; cursor: pointer;
            box-shadow: 0 8px 25px rgba(245,158,11,0.4);
            display: flex; align-items: center; gap: 10px;
            transition: all 0.2s; z-index: 10000; white-space: nowrap;
        }
        #captureBtnOverlay:hover  { transform: translateX(-50%) scale(1.05); box-shadow: 0 12px 35px rgba(245,158,11,0.5); }
        #captureBtnOverlay:active { transform: translateX(-50%) scale(0.98); }

        .qr-box {
            background: white; padding: 20px; border-radius: 15px;
            text-align: center; box-shadow: 0 0 50px rgba(255,255,255,0.2);
        }
        #overlayText {
            margin-top: 15px;
            font-size: 60px; font-family: 'Courier New', monospace;
            font-weight: bold; color: #000; letter-spacing: 2px;
        }

        /* ── Подсказки снизу ── */
        .qr-overlay-footer {
            padding: 10px 0 18px;
            text-align: center; cursor: default;
        }
        #hint      { color: #888; font-size: 18px; }
        #spaceHint { margin-top: 8px; color: #4ade80; font-size: 14px; }

        #hiddenPreview { display: none; }
        #captureVideo  { display: none; }

        #coordsDisplay, #windowNameDisplay {
            font-family: 'JetBrains Mono', 'Courier New', monospace;
            font-size: 13px; letter-spacing: 0.5px;
            background: rgba(15,23,42,0.8);
            padding: 8px 12px; border-radius: 8px; color: #cbd5f5;
            border: 1px solid rgba(96,165,250,0.35);
            box-shadow: 0 6px 18px rgba(37,99,235,0.25);
        }
        #windowNameDisplay {
            font-size: 12px;
            background: rgba(22,163,74,0.2); color: #86efac;
            border: 1px solid rgba(34,197,94,0.35);
            max-width: 200px; overflow: hidden;
            text-overflow: ellipsis; white-space: nowrap;
        }
    </style>
</head>
<body>

    <div id="modeSwitcher">
        <span id="modeLabelOff" class="mode-label off">📺</span>
        <label class="switch">
            <input type="checkbox" id="modeToggle">
            <span class="slider"></span>
        </label>
        <span id="modeLabelOn" class="mode-label on">🔴</span>
    </div>

    <div id="languageSwitcher">
        <span id="currentFlag" class="fi fi-pl"></span>
        <select id="langSelect">
            <option value="pl" data-flag="fi fi-pl">Polski</option>
            <option value="uk" data-flag="fi fi-ua">Українська</option>
            <option value="en" data-flag="fi fi-gb">English</option>
        </select>
    </div>

    <div id="startScreen">
        <h1 id="startTitle">MAX QR READER</h1>
        <p  id="startSubtitle">Wybierz źródło obrazu</p>
        <button id="captureBtn" class="btn-big btn-blue" onclick="startCapture()">📸 PRZECHWYĆ OKNO</button>
        <button id="fileBtn"    class="btn-big btn-blue" style="background:#4b5563"
                onclick="document.getElementById('fileIn').click()">📂 OTWÓRZ PLIK</button>
        <button id="cardsBtn"   class="btn-big btn-green"
                onclick="window.location.href='https://worklaf.github.io/MOWI/QR_Cards.html'">🃏 KARTY QR</button>
        <input type="file" id="fileIn" hidden onchange="handleFile(event)">
    </div>

    <div id="workControls">
        <span id="statusText" style="font-weight:bold;text-shadow:1px 1px 2px black;">Zaznacz obszar</span>
        <span id="coordsDisplay">x: — | y: — | w: — | h: —</span>
        <span id="windowNameDisplay" style="display:none;">—</span>
        <button id="clearCoordsBtn" class="btn-ghost">🗑️ RESET</button>
        <button id="resetBtn" class="btn-small" onclick="location.reload()">🔄 RESET</button>
    </div>

    <div class="canvas-container">
        <canvas id="mainCanvas"></canvas>
    </div>

    <video id="captureVideo" autoplay playsinline></video>

    <!-- ══ QR Overlay ══ -->
    <div id="qrOverlay" onclick="closeOverlay()">

        <div class="qr-overlay-body">

            <!-- ЛЕВАЯ ИСТОРИЯ -->
            <div id="qhSidebar" onclick="event.stopPropagation()">
                <div class="qh-header">История</div>
                <div id="qhList"></div>
            </div>

            <!-- ЦЕНТРАЛЬНЫЙ QR -->
            <div class="qr-center" onclick="event.stopPropagation()">
                <div class="qr-container">
                    <button id="captureBtnOverlay"
                            onclick="event.stopPropagation(); doQuickCapture();">
                        📸 <span id="captureBtnText">NOWY ZRZUT</span>
                    </button>
                    <div class="qr-box">
                        <canvas id="bigQrCanvas"></canvas>
                        <div id="overlayText">000000</div>
                    </div>
                </div>
            </div>

        </div>

        <div class="qr-overlay-footer">
            <div id="hint">Kliknij dowolne miejsce, aby zamknąć</div>
            <div id="spaceHint">Naciśnij SPACJĘ dla kolejnego zrzutu</div>
        </div>
    </div>

    <canvas id="hiddenPreview"></canvas>

<script>
    const mainCanvas   = document.getElementById('mainCanvas');
    const ctx          = mainCanvas.getContext('2d');
    const previewCanvas= document.getElementById('hiddenPreview');
    const pCtx         = previewCanvas.getContext('2d', { willReadFrequently: true });
    const captureVideo = document.getElementById('captureVideo');

    let activeStream = null, savedStreamId = null;
    let isDrawing = false, startX, startY, imgDataSnapshot;
    let storedRegion = null, lastWindowName = null;
    let isCapturing = false, isProcessing = false, isVideoMode = false;

    const startScreen   = document.getElementById('startScreen');
    const workControls  = document.getElementById('workControls');
    const statusText    = document.getElementById('statusText');
    const modeToggle    = document.getElementById('modeToggle');
    const modeLabelOn   = document.getElementById('modeLabelOn');
    const modeLabelOff  = document.getElementById('modeLabelOff');
    const langSelect    = document.getElementById('langSelect');
    const currentFlag   = document.getElementById('currentFlag');
    const startTitleEl  = document.getElementById('startTitle');
    const startSubtitleEl = document.getElementById('startSubtitle');
    const captureBtn    = document.getElementById('captureBtn');
    const fileBtn       = document.getElementById('fileBtn');
    const cardsBtn      = document.getElementById('cardsBtn');
    const resetBtn      = document.getElementById('resetBtn');
    const overlayHintEl = document.getElementById('hint');
    const spaceHintEl   = document.getElementById('spaceHint');
    const captureBtnText= document.getElementById('captureBtnText');
    const coordsDisplay = document.getElementById('coordsDisplay');
    const clearCoordsBtn= document.getElementById('clearCoordsBtn');
    const windowNameDisplay = document.getElementById('windowNameDisplay');
    const htmlElement   = document.documentElement;
    const qhSidebar     = document.getElementById('qhSidebar');
    const qhList        = document.getElementById('qhList');

    const HARDCODED_THRESHOLD = 210;
    const STORAGE_KEY        = 'maxqr_savedRegion';
    const STORAGE_KEY_WINDOW = 'maxqr_savedWindow';
    const STORAGE_KEY_MODE   = 'maxqr_videoMode';

    const translations = {
        pl: {
            startTitle:'MAX QR READER', startSubtitle:'Wybierz źródło obrazu',
            captureWindowBtn:'📸 PRZECHWYĆ OKNO', openFileBtn:'📂 OTWÓRZ PLIK',
            cardsBtn:'🃏 KARTY QR', resetBtn:'🔄 RESET',
            statusReady:'Zaznacz obszar', statusProcessing:'⚡ Przetwarzanie...',
            statusDone:'Gotowe!', statusFail:'Nic nie znaleziono. Spróbuj ponownie.',
            overlayHint:'Kliknij dowolne miejsce, aby zamknąć',
            overlayReady:'Gotowy na kolejne zaznaczenie',
            statusAutoInit:'Automatyczne przetwarzanie zapisanego obszaru…',
            statusAutoError:'Zapisany obszar poza kadrem. Zaznacz ponownie.',
            statusCoordsCleared:'Współrzędne wyzerowane.',
            clearCoordsBtn:'🗑️ RESET',
            spaceHint:'Naciśnij SPACJĘ dla kolejnego zrzutu',
            captureBtnText:'NOWY ZRZUT',
            statusReconnecting:'🔄 Próba połączenia z ostatnim oknem...',
            statusSelectNew:'⚠️ Wybierz okno ponownie',
        },
        uk: {
            startTitle:'MAX QR READER', startSubtitle:'Виберіть джерело зображення',
            captureWindowBtn:'📸 ЗАХОПИТИ ВІКНО', openFileBtn:'📂 ВІДКРИТИ ФАЙЛ',
            cardsBtn:'🃏 QR КАРТКИ', resetBtn:'🔄 СКИНУТИ',
            statusReady:'Виділіть область', statusProcessing:'⚡ Обробка...',
            statusDone:'Готово!', statusFail:'Нічого не знайдено. Спробуйте ще раз.',
            overlayHint:'Клікніть будь-де, щоб закрити',
            overlayReady:'Готовий до нового виділення',
            statusAutoInit:'Автообробка збереженої зони…',
            statusAutoError:'Збережена зона поза кадром. Виділіть знову.',
            statusCoordsCleared:'Координати скинуті.',
            clearCoordsBtn:'🗑️ СКИНУТИ',
            spaceHint:'Натисніть ПРОБІЛ для наступного знімка',
            captureBtnText:'НОВИЙ ЗНІМОК',
            statusReconnecting:'🔄 Спроба з\'єднання з останнім вікном...',
            statusSelectNew:'⚠️ Виберіть вікно знову',
        },
        en: {
            startTitle:'MAX QR READER', startSubtitle:'Select image source',
            captureWindowBtn:'📸 CAPTURE WINDOW', openFileBtn:'📂 OPEN FILE',
            cardsBtn:'🃏 QR CARDS', resetBtn:'🔄 RESET',
            statusReady:'Select area', statusProcessing:'⚡ Processing...',
            statusDone:'Done!', statusFail:'Nothing found. Try again.',
            overlayHint:'Click anywhere to close',
            overlayReady:'Ready for next selection',
            statusAutoInit:'Auto-processing saved area...',
            statusAutoError:'Saved area out of frame. Select again.',
            statusCoordsCleared:'Coordinates cleared.',
            clearCoordsBtn:'🗑️ CLEAR',
            spaceHint:'Press SPACE for next capture',
            captureBtnText:'NEW CAPTURE',
            statusReconnecting:'🔄 Trying to reconnect to last window...',
            statusSelectNew:'⚠️ Select window again',
        }
    };
    const ocrLangMap = { pl: 'pol', uk: 'ukr', en: 'eng' };

    let currentLang = langSelect.value || 'pl';
    let currentStatusKey = 'statusReady';

    /* ── Режим ── */
    function initMode() {
        isVideoMode = localStorage.getItem(STORAGE_KEY_MODE) === 'true';
        modeToggle.checked = isVideoMode;
        updateModeUI();
    }
    function updateModeUI() {
        if (isVideoMode) {
            modeLabelOn.className  = 'mode-label on';
            modeLabelOff.className = 'mode-label off';
        } else {
            modeLabelOn.className  = 'mode-label off';
            modeLabelOff.className = 'mode-label on';
        }
    }
    modeToggle.addEventListener('change', () => {
        isVideoMode = modeToggle.checked;
        localStorage.setItem(STORAGE_KEY_MODE, isVideoMode);
        updateModeUI();
        if (!isVideoMode && activeStream) stopVideoStream();
    });
    function stopVideoStream() {
        if (activeStream) { activeStream.getTracks().forEach(t => t.stop()); activeStream = null; }
        captureVideo.srcObject = null;
    }

    /* ── Переводы ── */
    function t(k) { return (translations[currentLang]||{})[k] || k; }
    function refreshStatus() { statusText.innerText = t(currentStatusKey); }
    function setStatus(k) { currentStatusKey = k; refreshStatus(); }
    function applyTranslations() {
        startTitleEl.innerText    = t('startTitle');
        startSubtitleEl.innerText = t('startSubtitle');
        captureBtn.innerText      = t('captureWindowBtn');
        fileBtn.innerText         = t('openFileBtn');
        cardsBtn.innerText        = t('cardsBtn');
        resetBtn.innerText        = t('resetBtn');
        overlayHintEl.innerText   = t('overlayHint');
        spaceHintEl.innerText     = t('spaceHint');
        clearCoordsBtn.innerText  = t('clearCoordsBtn');
        captureBtnText.innerText  = t('captureBtnText');
        refreshStatus();
        updateCoordsDisplay(storedRegion);
    }
    langSelect.addEventListener('change', () => {
        currentLang = langSelect.value;
        htmlElement.lang = currentLang;
        currentFlag.className = langSelect.options[langSelect.selectedIndex].getAttribute('data-flag');
        applyTranslations();
    });
    (function initFlag() {
        const o = langSelect.options[langSelect.selectedIndex];
        if (o && o.dataset.flag) currentFlag.className = o.dataset.flag;
    })();

    /* ── Регион ── */
    function loadStoredRegion() {
        try {
            const r = JSON.parse(localStorage.getItem(STORAGE_KEY)||'null');
            storedRegion = (r && isFinite(r.x) && isFinite(r.y) && isFinite(r.w) && isFinite(r.h)) ? r : null;
        } catch { storedRegion = null; }
        updateCoordsDisplay(storedRegion);
    }
    function storeRegion(region) {
        storedRegion = { x:Math.round(region.x), y:Math.round(region.y), w:Math.round(region.w), h:Math.round(region.h) };
        try { localStorage.setItem(STORAGE_KEY, JSON.stringify(storedRegion)); } catch {}
        updateCoordsDisplay(storedRegion);
    }
    function clearStoredRegion() {
        storedRegion = null;
        localStorage.removeItem(STORAGE_KEY);
        updateCoordsDisplay(null);
        clearStoredWindow();
        setStatus('statusCoordsCleared');
    }
    function updateCoordsDisplay(r) {
        coordsDisplay.textContent = r
            ? `x: ${r.x} | y: ${r.y} | w: ${r.w} | h: ${r.h}`
            : 'x: — | y: — | w: — | h: —';
    }
    clearCoordsBtn.addEventListener('click', clearStoredRegion);

    /* ── Окно ── */
    function loadStoredWindow() {
        try {
            const p = JSON.parse(localStorage.getItem(STORAGE_KEY_WINDOW)||'null');
            if (p) { lastWindowName = p.name||null; savedStreamId = p.streamId||null; updateWindowDisplay(); }
        } catch { lastWindowName = null; savedStreamId = null; }
    }
    function storeWindowInfo(name, streamId) {
        lastWindowName = name; savedStreamId = streamId;
        try { localStorage.setItem(STORAGE_KEY_WINDOW, JSON.stringify({name, streamId, timestamp:Date.now()})); } catch {}
        updateWindowDisplay();
    }
    function updateWindowDisplay() {
        if (lastWindowName) {
            windowNameDisplay.textContent = `🖥️ ${lastWindowName}`;
            windowNameDisplay.style.display = 'inline-block';
        } else {
            windowNameDisplay.style.display = 'none';
        }
    }
    function clearStoredWindow() {
        lastWindowName = null; savedStreamId = null;
        localStorage.removeItem(STORAGE_KEY_WINDOW);
        updateWindowDisplay();
    }

    /* ── Инициализация ── */
    htmlElement.lang = currentLang;
    applyTranslations(); initMode(); loadStoredRegion(); loadStoredWindow();

    function enterWorkMode() {
        startScreen.style.display = 'none';
        workControls.style.display = 'flex';
        if (!storedRegion) setStatus('statusReady');
    }

    /* ══════════════════════════════════════
       ИСТОРИЯ — внутри оверлея
    ══════════════════════════════════════ */
    const scansHistory = []; // { code, dataURL }

    function addToHistory(dataURL, code) {
        scansHistory.unshift({ dataURL, code });
        renderSidebar();
    }

    function renderSidebar() {
        qhList.innerHTML = '';
        const prev = scansHistory.slice(1); // всё кроме последнего (он в центре)

        if (prev.length === 0) { qhSidebar.style.display = 'none'; return; }
        qhSidebar.style.display = 'flex';

        prev.forEach((item, i) => {
            const el = document.createElement('div');
            el.className = 'qh-card';
            el.innerHTML = `
                <img src="${item.dataURL}" alt="">
                <div class="qh-card-code">${item.code}</div>
            `;
            el.addEventListener('click', e => {
                e.stopPropagation();
                // Показать этот QR в центре
                new QRious({ element: document.getElementById('bigQrCanvas'), value: item.code, size: 400 });
                document.getElementById('overlayText').innerText = item.code;
                qhList.querySelectorAll('.qh-card').forEach((c, ci) => c.classList.toggle('active', ci === i));
            });
            qhList.appendChild(el);
        });
    }

    /* ── Оверлей ── */
    function showOverlay(text) {
        const bigQrCanvas = document.getElementById('bigQrCanvas');
        new QRious({ element: bigQrCanvas, value: text, size: 400 });
        document.getElementById('overlayText').innerText = text;

        addToHistory(bigQrCanvas.toDataURL('image/png'), text);

        document.getElementById('qrOverlay').style.display = 'flex';
    }

    function closeOverlay() {
        document.getElementById('qrOverlay').style.display = 'none';
        setStatus('overlayReady');
    }

    document.addEventListener('keydown', async e => {
        const open = document.getElementById('qrOverlay').style.display === 'flex';
        if (!open) return;
        if (e.code === 'Space')                        { e.preventDefault(); await doQuickCapture(); }
        else if (e.code === 'Enter' || e.code === 'Escape') { closeOverlay(); }
    });

    /* ── Захват ── */
    async function doQuickCapture() {
        if (isCapturing || isProcessing) return;
        isCapturing = true;
        closeOverlay();
        setStatus('statusProcessing');
        try {
            if (isVideoMode && savedStreamId) {
                if (activeStream && captureVideo.readyState >= 2) {
                    refreshCanvasFromVideo(); await processSavedRegion();
                    isCapturing = false; return;
                }
                try {
                    setStatus('statusReconnecting');
                    const s = await tryReconnectStream();
                    if (s) { await processStream(s); isCapturing = false; return; }
                } catch (e) { console.log('Reconnect failed:', e); }
            }
            await doFullCapture();
        } catch(e) { console.error(e); setStatus('statusFail'); }
        finally    { isCapturing = false; }
    }

    function refreshCanvasFromVideo() {
        if (captureVideo.readyState >= 2 && mainCanvas.width > 0) ctx.drawImage(captureVideo, 0, 0);
    }

    async function tryReconnectStream() {
        const controller = new CaptureController();
        if (typeof controller.setFocusBehavior === 'function') controller.setFocusBehavior('no-focus-change');
        return await navigator.mediaDevices.getDisplayMedia({
            video: { cursor: 'always', displaySurface: 'window' }, audio: false, controller
        });
    }

    async function processSavedRegion() {
        const s = sanitizeRegion(storedRegion);
        if (s) await processAndRecognize(s); else setStatus('statusAutoError');
    }

    async function processStream(stream) {
        if (activeStream && activeStream !== stream) {
            activeStream.getTracks().forEach(t => t.stop());
            activeStream = null; captureVideo.srcObject = null;
        }
        const vt = stream.getVideoTracks()[0];
        const settings = vt.getSettings();
        if (!lastWindowName || vt.label !== lastWindowName) storeWindowInfo(vt.label, settings.deviceId||null);
        try {
            captureVideo.srcObject = stream;
            await captureVideo.play();
            await new Promise(r => setTimeout(r, 200));
            mainCanvas.width  = captureVideo.videoWidth;
            mainCanvas.height = captureVideo.videoHeight;
            ctx.drawImage(captureVideo, 0, 0);
            if (!isVideoMode) {
                stream.getTracks().forEach(t => t.stop());
                captureVideo.srcObject = null; activeStream = null;
            } else {
                activeStream = stream;
                vt.onended = () => { activeStream = null; };
            }
            await processSavedRegion();
        } catch(e) {
            console.error(e); stream.getTracks().forEach(t => t.stop()); setStatus('statusFail');
        }
    }

    async function doFullCapture() {
        try {
            if (activeStream) stopVideoStream();
            const opts = { video: { cursor: 'always' }, audio: false };
            if ('CaptureController' in window) {
                const c = new CaptureController();
                c.setFocusBehavior('no-focus-change');
                opts.controller = c;
            }
            await processStream(await navigator.mediaDevices.getDisplayMedia(opts));
        } catch(e) { console.error(e); setStatus('statusFail'); }
    }

    async function startCapture() { await doFullCapture(); enterWorkMode(); }

    function handleFile(e) {
        if (!e.target.files[0]) return;
        const img = new Image();
        img.onload = () => {
            mainCanvas.width = img.width; mainCanvas.height = img.height;
            ctx.drawImage(img, 0, 0);
            enterWorkMode();
            if (storedRegion) setTimeout(() => tryAutoProcessStoredRegion(), 100);
        };
        img.src = URL.createObjectURL(e.target.files[0]);
    }

    function tryAutoProcessStoredRegion() {
        const s = sanitizeRegion(storedRegion);
        if (!s) { setStatus('statusAutoError'); return; }
        setStatus('statusAutoInit');
        processAndRecognize(s);
    }

    function sanitizeRegion(r) {
        if (!r) return null;
        const cw = mainCanvas.width, ch = mainCanvas.height;
        if (!cw || !ch) return null;
        const x = Math.max(0, Math.min(cw-1, r.x));
        const y = Math.max(0, Math.min(ch-1, r.y));
        const w = Math.max(0, Math.min(r.w, cw-x));
        const h = Math.max(0, Math.min(r.h, ch-y));
        return (w < 6 || h < 6) ? null : { x, y, w, h };
    }

    /* ── Мышь ── */
    mainCanvas.addEventListener('mousedown', e => {
        if (!mainCanvas.width) return;
        const rect = mainCanvas.getBoundingClientRect();
        const sx = mainCanvas.width/rect.width, sy = mainCanvas.height/rect.height;
        startX = (e.clientX - rect.left)*sx; startY = (e.clientY - rect.top)*sy;
        isDrawing = true;
        imgDataSnapshot = ctx.getImageData(0, 0, mainCanvas.width, mainCanvas.height);
    });
    mainCanvas.addEventListener('mousemove', e => {
        if (!isDrawing) return;
        const rect = mainCanvas.getBoundingClientRect();
        const sx = mainCanvas.width/rect.width, sy = mainCanvas.height/rect.height;
        const cx = (e.clientX-rect.left)*sx, cy = (e.clientY-rect.top)*sy;
        ctx.putImageData(imgDataSnapshot, 0, 0);
        ctx.strokeStyle = '#facc15'; ctx.lineWidth = 5;
        ctx.strokeRect(startX, startY, cx-startX, cy-startY);
    });
    mainCanvas.addEventListener('mouseup', e => {
        if (!isDrawing) return;
        isDrawing = false;
        const rect = mainCanvas.getBoundingClientRect();
        const sx = mainCanvas.width/rect.width, sy = mainCanvas.height/rect.height;
        const ex = (e.clientX-rect.left)*sx, ey = (e.clientY-rect.top)*sy;
        const w = Math.abs(ex-startX), h = Math.abs(ey-startY);
        if (w > 5 && h > 5) {
            const region = { x:Math.min(startX,ex), y:Math.min(startY,ey), w, h };
            storeRegion(region); setStatus('statusProcessing');
            processAndRecognize(region);
        }
    });

    /* ── OCR ── */
    async function processAndRecognize(region) {
        isProcessing = true;
        const SCALE = 3;
        previewCanvas.width  = region.w * SCALE;
        previewCanvas.height = region.h * SCALE;
        pCtx.imageSmoothingEnabled = true;
        pCtx.drawImage(mainCanvas, region.x, region.y, region.w, region.h, 0, 0, previewCanvas.width, previewCanvas.height);
        const imageData = pCtx.getImageData(0, 0, previewCanvas.width, previewCanvas.height);
        const data = imageData.data;
        for (let i = 0; i < data.length; i += 4) {
            const v = (data[i]+data[i+1]+data[i+2])/3 < HARDCODED_THRESHOLD ? 0 : 255;
            data[i] = v; data[i+1] = v; data[i+2] = v;
        }
        pCtx.putImageData(imageData, 0, 0);
        try {
            const result = await Tesseract.recognize(previewCanvas, ocrLangMap[currentLang]||'pol',
                { tessedit_char_whitelist: '0123456789' });
            const clean = result.data.text.replace(/\D/g,'').trim();
            if (clean.length > 0) { setStatus('statusDone'); showOverlay(clean); }
            else setStatus('statusFail');
        } catch(err) { setStatus('statusFail'); console.error(err); }
        finally     { isProcessing = false; }
    }

    window.addEventListener('beforeunload', () => {
        if (activeStream) activeStream.getTracks().forEach(t => t.stop());
    });
</script>
</body>
</html>
