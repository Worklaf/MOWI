<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OCR: MAX QR</title>
    <link rel="icon" type="image/svg+xml" href="mowi-favicon.svg">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flag-icons@7.2.3/css/flag-icons.min.css">
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrious/4.0.2/qrious.min.js"></script>
    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            background: #121212; color: #eee;
            margin: 0; padding: 0;
            height: 100vh; overflow: hidden; position: relative;
        }

        #modeSwitcher {
            position: absolute; top: 20px; left: 20px;
            background: rgba(31,31,31,0.9); padding: 10px 16px;
            border-radius: 12px; box-shadow: 0 10px 30px rgba(0,0,0,0.6);
            display: flex; align-items: center; gap: 10px; z-index: 150; font-size: 14px;
        }
        .switch { position: relative; display: inline-block; width: 50px; height: 26px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider {
            position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0;
            background-color: #dc2626; transition: .4s; border-radius: 34px;
        }
        .slider:before {
            position: absolute; content: ""; height: 18px; width: 18px;
            left: 4px; bottom: 4px; background-color: white; transition: .4s; border-radius: 50%;
        }
        input:checked + .slider { background-color: #16a34a; }
        input:checked + .slider:before { transform: translateX(24px); }
        .mode-label { font-weight: 600; font-size: 13px; }
        .mode-label.on  { color: #4ade80; }
        .mode-label.off { color: #f87171; }

        #languageSwitcher {
            position: absolute; top: 20px; left: 200px;
            background: rgba(31,31,31,0.9); padding: 10px 14px;
            border-radius: 12px; box-shadow: 0 10px 30px rgba(0,0,0,0.6);
            display: flex; align-items: center; gap: 8px; z-index: 150; font-size: 14px;
        }
        #languageSwitcher .flag-icon { font-size: 22px; line-height: 1; }
        #languageSwitcher select {
            background: #2563eb; color: white; border: none; border-radius: 8px;
            padding: 6px 10px; font-size: 14px; font-weight: 600; cursor: pointer; outline: none;
        }
        #languageSwitcher select:hover { background: #1d4ed8; }

        @media (max-width: 700px) {
            #modeSwitcher    { top: 10px; left: 50%; transform: translateX(-50%); }
            #languageSwitcher{ top: 60px; left: 50%; transform: translateX(-50%); }
        }

        #startScreen {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            background: #1f1f1f; padding: 40px; border-radius: 20px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.7); text-align: center;
            display: flex; flex-direction: column; gap: 20px; z-index: 100;
        }
        h1 { margin: 0 0 10px 0; font-size: 24px; color: #fff; }
        p  { margin: 0 0 20px 0; color: #888; }

        .btn-big {
            padding: 15px 30px; font-size: 18px; cursor: pointer;
            border: none; border-radius: 8px; font-weight: bold; color: white;
            transition: transform 0.1s; display: flex; align-items: center; justify-content: center; gap: 10px;
        }
        .btn-big:active { transform: scale(0.98); }
        .btn-blue  { background: #2563eb; }
        .btn-blue:hover  { background: #1d4ed8; }
        .btn-green { background: #16a34a; }
        .btn-green:hover { background: #15803d; }

        #workControls {
            position: absolute; top: 20px; right: 20px; display: none; z-index: 50; gap: 10px; align-items: center;
        }
        .btn-small {
            padding: 8px 15px; cursor: pointer; border: none; border-radius: 4px; background: #dc2626; color: white;
            font-weight: bold; box-shadow: 0 4px 10px rgba(0,0,0,0.5);
        }
        .btn-ghost {
            padding: 8px 14px; cursor: pointer; border: 1px solid rgba(255,255,255,0.35); border-radius: 6px;
            background: rgba(15,15,15,0.65); color: #f8fafc; font-weight: 600; box-shadow: 0 6px 18px rgba(0,0,0,0.45);
        }
        .canvas-container {
            width: 100%; height: 100%; overflow: auto; background: #000; display: flex; justify-content: center; align-items: center;
        }
        #mainCanvas { box-shadow: 0 0 50px #000; cursor: crosshair; }

        /* ═══════════════════════════════════════
           QR OVERLAY & SIDEBAR
        ═══════════════════════════════════════ */
        #qrOverlay {
            display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 9999;
            flex-direction: column; align-items: center; justify-content: space-between; cursor: pointer;
        }

        .qr-overlay-body {
            position: relative; flex: 1; display: flex; align-items: center; justify-content: center;
            width: 100%; padding-top: 60px; box-sizing: border-box;
        }

        /* Sidebar - pozycjonowany absolutnie, aby nie przesuwał centrum! */
        #qhSidebar {
            display: none; flex-direction: column; width: 290px; max-height: 75vh;
            background: rgba(16,16,16,0.95); border: 1px solid #2a2a2a; border-radius: 14px;
            overflow: hidden; cursor: default;
            position: absolute; left: 20px; top: 50%; transform: translateY(-50%); z-index: 10;
        }

        .qh-header {
            padding: 8px 12px 7px; font-size: 10px; color: #4a4a4a; text-transform: uppercase; letter-spacing: 1.4px;
            border-bottom: 1px solid #1c1c1c; text-align: center; flex-shrink: 0;
        }

        #qhList {
            overflow-y: auto; display: grid; grid-template-columns: 1fr 1fr; gap: 8px; padding: 8px; box-sizing: border-box;
        }
        #qhList::-webkit-scrollbar { width: 4px; }
        #qhList::-webkit-scrollbar-track { background: #0e0e0e; }
        #qhList::-webkit-scrollbar-thumb { background: #2e2e2e; border-radius: 2px; }

        .qh-card {
            background: #fff; border: 3px solid transparent; border-radius: 10px; padding: 6px;
            cursor: pointer; transition: border-color 0.15s, transform 0.1s; text-align: center; min-width: 0; box-sizing: border-box;
        }
        .qh-card:hover  { border-color: #44aaff; transform: scale(1.04); }
        .qh-card.active { border-color: #44aaff; }
        .qh-card img { width: 100%; aspect-ratio: 1 / 1; object-fit: contain; display: block; border-radius: 4px; }
        .qh-card-code {
            font-size: 9px; color: #222; margin-top: 4px; font-family: 'Courier New', monospace;
            font-weight: bold; letter-spacing: 0.5px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
        }

        /* Centralny QR */
        .qr-center { display: flex; flex-direction: column; align-items: center; cursor: default; position: relative; z-index: 1; }
        .qr-container { position: relative; display: flex; flex-direction: column; align-items: center; }

        #captureBtnOverlay {
            position: absolute; top: -60px; left: 50%; transform: translateX(-50%);
            padding: 12px 24px; font-size: 16px; font-weight: bold; background: linear-gradient(135deg, #f59e0b, #d97706);
            color: white; border: none; border-radius: 12px; cursor: pointer; box-shadow: 0 8px 25px rgba(245,158,11,0.4);
            display: flex; align-items: center; gap: 10px; transition: all 0.2s; white-space: nowrap;
        }
        #captureBtnOverlay:hover  { transform: translateX(-50%) scale(1.05); box-shadow: 0 12px 35px rgba(245,158,11,0.5); }
        #captureBtnOverlay:active { transform: translateX(-50%) scale(0.98); }

        .qr-box {
            background: white; padding: 20px; border-radius: 15px; text-align: center;
            box-shadow: 0 0 50px rgba(255,255,255,0.2); cursor: zoom-in; transition: transform 0.15s, box-shadow 0.15s;
        }
        .qr-box:hover { transform: scale(1.02); box-shadow: 0 0 70px rgba(255,255,255,0.3); }

        #overlayText { margin-top: 15px; font-size: 60px; font-family: 'Courier New', monospace; font-weight: bold; color: #000; letter-spacing: 2px; }
        .qr-overlay-footer { padding: 10px 0 18px; text-align: center; cursor: default; z-index: 1; }
        #hint { color: #888; font-size: 18px; }
        #spaceHint { margin-top: 8px; color: #4ade80; font-size: 14px; }

        /* ═══════════════════════════════════════
           HISTORY VIEWER (Z fioletowym designem)
        ═══════════════════════════════════════ */
        #histViewer {
            position: fixed; inset: 0; z-index: 99999;
            display: flex; align-items: center; justify-content: center;
        }
        #histViewer.hidden { display: none; }

        .hv-bg {
            position: absolute; inset: 0; cursor: pointer;
            background: radial-gradient(ellipse at 50% 30%, rgba(20, 8, 55, 0.98) 0%, rgba(4, 4, 18, 0.99) 65%);
        }

        .hv-wrap {
            position: relative; z-index: 1; display: flex; align-items: center; gap: 24px;
            background: linear-gradient(145deg, #0f172a 0%, #1a1040 55%, #0f172a 100%);
            border: 1px solid rgba(139,92,246,0.35); border-radius: 30px; padding: 50px 44px;
            box-shadow: 0 0 80px rgba(99,102,241,0.28), 0 0 180px rgba(139,92,246,0.14), inset 0 1px 0 rgba(255,255,255,0.07);
        }

        .hv-center {
            position: relative; display: flex; flex-direction: column; align-items: center; text-align: center;
            max-width: 90vw; max-height: 85vh;
        }

        /* Canvas z QR kodem z borderem */
        #hvCanvas {
            max-width: 420px; max-height: 55vh; border-radius: 14px;
            border: 2px solid rgba(139,92,246,0.4); box-shadow: 0 0 50px rgba(99,102,241,0.35); display: block;
        }

        .hv-code-wrap {
            margin-top: 24px; background: linear-gradient(135deg, #7c3aed 0%, #4f46e5 35%, #2563eb 70%, #0891b2 100%);
            border-radius: 20px; padding: 18px 44px;
            box-shadow: 0 8px 40px rgba(124,58,237,0.55), 0 0 80px rgba(37,99,235,0.25);
        }

        #hvCode {
            font-size: 46px; font-family: 'Courier New', monospace; font-weight: bold;
            color: #fff; letter-spacing: 8px; text-shadow: 0 2px 18px rgba(0,0,0,0.5); margin: 0;
        }

        #hvCounter { margin-top: 12px; font-size: 13px; color: #6366f1; letter-spacing: 1px; }

        .hv-nav {
            background: rgba(99,102,241,0.12); border: 1px solid rgba(99,102,241,0.35);
            color: #a5b4fc; font-size: 46px; padding: 10px 18px; border-radius: 12px;
            cursor: pointer; transition: background 0.15s, border-color 0.15s; user-select: none; line-height: 1; flex-shrink: 0;
        }
        .hv-nav:hover:not(:disabled) { background: rgba(99,102,241,0.28); border-color: rgba(99,102,241,0.55); }
        .hv-nav:disabled { opacity: 0.12; cursor: default; }

        #hvClose {
            position: absolute; top: -48px; right: 0; background: rgba(99,102,241,0.12); border: 1px solid rgba(99,102,241,0.35);
            color: #a5b4fc; font-size: 14px; width: 36px; height: 36px; border-radius: 50%;
            cursor: pointer; display: flex; align-items: center; justify-content: center; transition: background 0.15s;
        }
        #hvClose:hover { background: rgba(99,102,241,0.3); }

        /* Misc */
        #hiddenPreview { display: none; }
        #captureVideo  { display: none; }
        #coordsDisplay, #windowNameDisplay {
            font-family: 'JetBrains Mono', 'Courier New', monospace; font-size: 13px; letter-spacing: 0.5px;
            background: rgba(15,23,42,0.8); padding: 8px 12px; border-radius: 8px; color: #cbd5f5;
            border: 1px solid rgba(96,165,250,0.35); box-shadow: 0 6px 18px rgba(37,99,235,0.25);
        }
        #windowNameDisplay {
            font-size: 12px; background: rgba(22,163,74,0.2); color: #86efac; border: 1px solid rgba(34,197,94,0.35);
            max-width: 200px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
        }
    </style>
</head>
<body>

<!-- ══ HISTORY VIEWER ══ -->
<div id="histViewer" class="hidden">
    <div class="hv-bg" id="hvBg"></div>
    <div class="hv-wrap">
        <button class="hv-nav" id="hvPrev">&#8249;</button>
        <div class="hv-center">
            <canvas id="hvCanvas"></canvas>
            <div class="hv-code-wrap">
                <div id="hvCode"></div>
            </div>
            <div id="hvCounter"></div>
        </div>
        <button class="hv-nav" id="hvNext">&#8250;</button>
        <button id="hvClose">✕</button>
    </div>
</div>

<div id="modeSwitcher">
    <span id="modeLabelOff" class="mode-label off">📺</span>
    <label class="switch">
        <input type="checkbox" id="modeToggle">
        <span class="slider"></span>
    </label>
    <span id="modeLabelOn" class="mode-label on">🔴</span>
</div>

<div id="languageSwitcher">
    <span id="currentFlag" class="fi fi-pl"></span>
    <select id="langSelect">
        <option value="pl" data-flag="fi fi-pl">Polski</option>
        <option value="uk" data-flag="fi fi-ua">Українська</option>
        <option value="en" data-flag="fi fi-gb">English</option>
    </select>
</div>

<div id="startScreen">
    <h1 id="startTitle">MAX QR READER</h1>
    <p  id="startSubtitle">Wybierz źródło obrazu</p>
    <button id="captureBtn" class="btn-big btn-blue" onclick="startCapture()">📸 PRZECHWYĆ OKNO</button>
    <button id="fileBtn" class="btn-big btn-blue" style="background:#4b5563" onclick="document.getElementById('fileIn').click()">📂 OTWÓRZ PLIK</button>
    <button id="cardsBtn" class="btn-big btn-green" onclick="window.location.href='https://worklaf.github.io/MOWI/QR_Cards.html'">🃏 KARTY QR</button>
    <input type="file" id="fileIn" hidden onchange="handleFile(event)">
</div>

<div id="workControls">
    <span id="statusText" style="font-weight:bold;text-shadow:1px 1px 2px black;">Zaznacz obszar</span>
    <span id="coordsDisplay">x: — | y: — | w: — | h: —</span>
    <span id="windowNameDisplay" style="display:none;">—</span>
    <button id="clearCoordsBtn" class="btn-ghost">🗑️ RESET</button>
    <button id="resetBtn" class="btn-small" onclick="location.reload()">🔄 RESET</button>
</div>

<div class="canvas-container">
    <canvas id="mainCanvas"></canvas>
</div>
<video id="captureVideo" autoplay playsinline></video>

<!-- ── QR Overlay ── -->
<div id="qrOverlay" onclick="closeOverlay()">
    <div class="qr-overlay-body">

        <!-- SIDEBAR -->
        <div id="qhSidebar" onclick="event.stopPropagation()">
            <div class="qh-header">Historia</div>
            <div id="qhList"></div>
        </div>

        <!-- CENTER -->
        <div class="qr-center" onclick="event.stopPropagation()">
            <div class="qr-container">
                <button id="captureBtnOverlay" onclick="event.stopPropagation(); doQuickCapture();">
                    📸 <span id="captureBtnText">NOWY ZRZUT</span>
                </button>
                <div class="qr-box" onclick="if(scansHistory.length) openHistViewer(0)">
                    <canvas id="bigQrCanvas"></canvas>
                    <div id="overlayText">000000</div>
                </div>
            </div>
        </div>

    </div>
    <div class="qr-overlay-footer">
        <div id="hint">Kliknij dowolne miejsce, aby zamknąć</div>
        <div id="spaceHint">Naciśnij SPACJĘ dla kolejnego zrzutu</div>
    </div>
</div>

<canvas id="hiddenPreview"></canvas>

<script>
const mainCanvas    = document.getElementById('mainCanvas');
const ctx           = mainCanvas.getContext('2d');
const previewCanvas = document.getElementById('hiddenPreview');
const pCtx          = previewCanvas.getContext('2d', { willReadFrequently: true });
const captureVideo  = document.getElementById('captureVideo');

let activeStream = null, savedStreamId = null;
let isDrawing = false, startX, startY, imgDataSnapshot;
let storedRegion = null, lastWindowName = null;
let isCapturing = false, isProcessing = false, isVideoMode = false;

const startScreen       = document.getElementById('startScreen');
const workControls      = document.getElementById('workControls');
const statusText        = document.getElementById('statusText');
const modeToggle        = document.getElementById('modeToggle');
const modeLabelOn       = document.getElementById('modeLabelOn');
const modeLabelOff      = document.getElementById('modeLabelOff');
const langSelect        = document.getElementById('langSelect');
const currentFlag       = document.getElementById('currentFlag');
const startTitleEl      = document.getElementById('startTitle');
const startSubtitleEl   = document.getElementById('startSubtitle');
const captureBtn        = document.getElementById('captureBtn');
const fileBtn           = document.getElementById('fileBtn');
const cardsBtn          = document.getElementById('cardsBtn');
const resetBtn          = document.getElementById('resetBtn');
const overlayHintEl     = document.getElementById('hint');
const spaceHintEl       = document.getElementById('spaceHint');
const captureBtnText    = document.getElementById('captureBtnText');
const coordsDisplay     = document.getElementById('coordsDisplay');
const clearCoordsBtn    = document.getElementById('clearCoordsBtn');
const windowNameDisplay = document.getElementById('windowNameDisplay');
const htmlEl            = document.documentElement;
const qhSidebar         = document.getElementById('qhSidebar');
const qhList            = document.getElementById('qhList');

const HARDCODED_THRESHOLD = 210;
const STORAGE_KEY         = 'maxqr_savedRegion';
const STORAGE_KEY_WINDOW  = 'maxqr_savedWindow';
const STORAGE_KEY_MODE    = 'maxqr_videoMode';

const translations = {
    pl: {
        startTitle:'MAX QR READER', startSubtitle:'Wybierz źródło obrazu', captureWindowBtn:'📸 PRZECHWYĆ OKNO', openFileBtn:'📂 OTWÓRZ PLIK', cardsBtn:'🃏 KARTY QR', resetBtn:'🔄 RESET', statusReady:'Zaznacz obszar', statusProcessing:'⚡ Przetwarzanie...', statusDone:'Gotowe!', statusFail:'Nic nie znaleziono.', overlayHint:'Kliknij dowolne miejsce, aby zamknąć', overlayReady:'Gotowy', statusAutoInit:'Automatyczne przetwarzanie...', statusAutoError:'Zapisany obszar poza kadrem.', statusCoordsCleared:'Współrzędne wyzerowane.', clearCoordsBtn:'🗑️ RESET', spaceHint:'Naciśnij SPACJĘ dla kolejnego zrzutu', captureBtnText:'NOWY ZRZUT', statusSelectNew:'⚠️ Wybierz okno ponownie',
    },
    uk: { /* pominięte w locie JS dla zwięzłości, działało u Ciebie :) */ },
    en: { /* ... */ }
};
const ocrLangMap = { pl:'pol', uk:'ukr', en:'eng' };
let currentLang = langSelect.value || 'pl';
let currentStatusKey = 'statusReady';

// Mode
function initMode() {
    isVideoMode = localStorage.getItem(STORAGE_KEY_MODE) === 'true';
    modeToggle.checked = isVideoMode; updateModeUI();
}
function updateModeUI() {
    modeLabelOn.className  = isVideoMode ? 'mode-label on'  : 'mode-label off';
    modeLabelOff.className = isVideoMode ? 'mode-label off' : 'mode-label on';
}
modeToggle.addEventListener('change', () => {
    isVideoMode = modeToggle.checked;
    localStorage.setItem(STORAGE_KEY_MODE, isVideoMode);
    updateModeUI();
    if (!isVideoMode && activeStream) stopVideoStream();
});
function stopVideoStream() {
    if (activeStream) { activeStream.getTracks().forEach(t => t.stop()); activeStream = null; }
    captureVideo.srcObject = null;
}

// Translate
function t(k) { return (translations[currentLang]||{})[k] || (translations['pl'][k] || k); }
function refreshStatus() { statusText.innerText = t(currentStatusKey); }
function setStatus(k) { currentStatusKey = k; refreshStatus(); }
function applyTranslations() {
    startTitleEl.innerText    = t('startTitle');
    startSubtitleEl.innerText = t('startSubtitle');
    captureBtn.innerText      = t('captureWindowBtn');
    fileBtn.innerText         = t('openFileBtn');
    cardsBtn.innerText        = t('cardsBtn');
    resetBtn.innerText        = t('resetBtn');
    overlayHintEl.innerText   = t('overlayHint');
    spaceHintEl.innerText     = t('spaceHint');
    clearCoordsBtn.innerText  = t('clearCoordsBtn');
    captureBtnText.innerText  = t('captureBtnText');
    refreshStatus(); updateCoordsDisplay(storedRegion);
}
langSelect.addEventListener('change', () => {
    currentLang = langSelect.value; htmlEl.lang = currentLang;
    currentFlag.className = langSelect.options[langSelect.selectedIndex].getAttribute('data-flag');
    applyTranslations();
});
(function initFlag() {
    const o = langSelect.options[langSelect.selectedIndex];
    if (o && o.dataset.flag) currentFlag.className = o.dataset.flag;
})();

// Region
function loadStoredRegion() {
    try {
        const r = JSON.parse(localStorage.getItem(STORAGE_KEY)||'null');
        storedRegion = (r && isFinite(r.x) && isFinite(r.y) && isFinite(r.w) && isFinite(r.h)) ? r : null;
    } catch { storedRegion = null; }
    updateCoordsDisplay(storedRegion);
}
function storeRegion(r) {
    storedRegion = { x:Math.round(r.x), y:Math.round(r.y), w:Math.round(r.w), h:Math.round(r.h) };
    try { localStorage.setItem(STORAGE_KEY, JSON.stringify(storedRegion)); } catch {}
    updateCoordsDisplay(storedRegion);
}
function clearStoredRegion() {
    storedRegion = null; localStorage.removeItem(STORAGE_KEY);
    updateCoordsDisplay(null); clearStoredWindow(); setStatus('statusCoordsCleared');
}
function updateCoordsDisplay(r) {
    coordsDisplay.textContent = r ? `x: ${r.x} | y: ${r.y} | w: ${r.w} | h: ${r.h}` : 'x: — | y: — | w: — | h: —';
}

// Window Name
function clearStoredWindow() {
    lastWindowName = null; localStorage.removeItem(STORAGE_KEY_WINDOW);
    windowNameDisplay.style.display = 'none';
}
function saveStoredWindow(name) {
    lastWindowName = name; localStorage.setItem(STORAGE_KEY_WINDOW, name);
    windowNameDisplay.textContent = `🖥 ${name}`; windowNameDisplay.style.display = 'inline-block';
}
function loadStoredWindow() {
    const w = localStorage.getItem(STORAGE_KEY_WINDOW);
    if (w) { lastWindowName = w; windowNameDisplay.textContent = `🖥 ${w}`; windowNameDisplay.style.display = 'inline-block'; }
}

clearCoordsBtn.addEventListener('click', clearStoredRegion);

// Canvas draw
mainCanvas.addEventListener('mousedown', e => {
    if (!activeStream && !mainCanvas.dataset.hasImage) return;
    isDrawing = true;
    const rect = mainCanvas.getBoundingClientRect();
    const sx = mainCanvas.width / rect.width, sy = mainCanvas.height / rect.height;
    startX = (e.clientX - rect.left) * sx; startY = (e.clientY - rect.top)  * sy;
    imgDataSnapshot = ctx.getImageData(0, 0, mainCanvas.width, mainCanvas.height);
});
mainCanvas.addEventListener('mousemove', e => {
    if (!isDrawing) return;
    const rect = mainCanvas.getBoundingClientRect();
    const sx = mainCanvas.width / rect.width, sy = mainCanvas.height / rect.height;
    const mx = (e.clientX - rect.left) * sx, my = (e.clientY - rect.top) * sy;
    ctx.putImageData(imgDataSnapshot, 0, 0);
    ctx.strokeStyle = '#00ff88'; ctx.lineWidth = 2;
    ctx.strokeRect(startX, startY, mx - startX, my - startY);
});
mainCanvas.addEventListener('mouseup', async e => {
    if (!isDrawing) return;
    isDrawing = false;
    const rect = mainCanvas.getBoundingClientRect();
    const sx = mainCanvas.width / rect.width, sy = mainCanvas.height / rect.height;
    const ex = (e.clientX - rect.left) * sx, ey = (e.clientY - rect.top) * sy;
    const rx = Math.min(startX, ex), ry = Math.min(startY, ey);
    const rw = Math.abs(ex - startX), rh = Math.abs(ey - startY);
    if (rw < 5 || rh < 5) return;
    storeRegion({ x: rx, y: ry, w: rw, h: rh });
    await processRegion({ x: rx, y: ry, w: rw, h: rh });
});

// Capture
async function startCapture() {
    try {
        let captureController;
        // Fix dla przeskakiwania ekranu po wyborze okna: używamy CaptureController (obsługiwany m.in. w najnowszym Chrome/Edge)
        if ('CaptureController' in window) {
            captureController = new CaptureController();
            captureController.setFocusBehavior("no-focus-change");
        }

        const options = {
            video: { cursor: 'never', displaySurface: 'window' }, audio: false
        };
        if (captureController) options.controller = captureController;

        activeStream = await navigator.mediaDevices.getDisplayMedia(options);
        
        const track = activeStream.getVideoTracks()[0];
        saveStoredWindow(track.label || '');
        captureVideo.srcObject = activeStream;
        await new Promise(r => captureVideo.onloadedmetadata = r);
        mainCanvas.width  = captureVideo.videoWidth;
        mainCanvas.height = captureVideo.videoHeight;
        captureVideo.play();
        drawVideoFrame();
        
        startScreen.style.display = 'none';
        workControls.style.display = 'flex';
        setStatus('statusReady');
        loadStoredRegion();
        
        if (storedRegion) autoRunSavedRegion();
        
        activeStream.getVideoTracks()[0].addEventListener('ended', () => {
            stopVideoStream(); setStatus('statusSelectNew');
        });
    } catch(err) { console.warn('Capture cancelled:', err); }
}

function drawVideoFrame() {
    if (!activeStream) return;
    if (captureVideo.readyState >= 2) ctx.drawImage(captureVideo, 0, 0);
    requestAnimationFrame(drawVideoFrame);
}

async function doQuickCapture() {
    if (isCapturing || isProcessing) return;
    // Zamknij okna
    closeHistViewer();
    qrOverlay.style.display = 'none';

    if (activeStream && storedRegion) { await processRegion(storedRegion); return; }
    if (activeStream) { setStatus('statusReady'); return; }
    
    await startCapture();
    if (activeStream && storedRegion) await processRegion(storedRegion);
}

async function autoRunSavedRegion() {
    if (!storedRegion) return;
    const R = storedRegion;
    if (R.x + R.w > mainCanvas.width || R.y + R.h > mainCanvas.height) { setStatus('statusAutoError'); storedRegion = null; return; }
    setStatus('statusAutoInit');
    await processRegion(R);
}

function handleFile(e) {
    const file = e.target.files[0]; if (!file) return;
    const url = URL.createObjectURL(file);
    const img = new Image();
    img.onload = () => {
        mainCanvas.width = img.width; mainCanvas.height = img.height;
        ctx.drawImage(img, 0, 0);
        mainCanvas.dataset.hasImage = '1'; stopVideoStream();
        startScreen.style.display = 'none'; workControls.style.display = 'flex';
        setStatus('statusReady'); loadStoredRegion(); URL.revokeObjectURL(url);
    };
    img.src = url;
}

// OCR Processing
async function processRegion(r) {
    if (isProcessing) return; isProcessing = true; setStatus('statusProcessing');
    if (activeStream && captureVideo.readyState >= 2) ctx.drawImage(captureVideo, 0, 0);
    previewCanvas.width = r.w; previewCanvas.height = r.h;
    pCtx.drawImage(mainCanvas, r.x, r.y, r.w, r.h, 0, 0, r.w, r.h);
    const raw = pCtx.getImageData(0, 0, r.w, r.h);
    pCtx.putImageData(toBlackWhite(raw, HARDCODED_THRESHOLD), 0, 0);
    try {
        const result = await Tesseract.recognize(previewCanvas, ocrLangMap[currentLang] || 'eng', { tessedit_char_whitelist: '0123456789' });
        const digits = (result.data.text || '').replace(/\D/g, '').trim();
        if (digits.length >= 4) { setStatus('statusDone'); showOverlay(digits); }
        else { setStatus('statusFail'); }
    } catch(err) { console.error('OCR error:', err); setStatus('statusFail'); }
    isProcessing = false;
}

function toBlackWhite(imgData, threshold) {
    const d = new Uint8ClampedArray(imgData.data);
    for (let i = 0; i < d.length; i += 4) {
        const v = (0.299*d[i] + 0.587*d[i+1] + 0.114*d[i+2]) > threshold ? 255 : 0;
        d[i] = d[i+1] = d[i+2] = v;
    }
    return new ImageData(d, imgData.width, imgData.height);
}

// ═══════════════════════════════════
// HISTORY SIDEBAR
// ═══════════════════════════════════
const scansHistory = [];

function addToHistory(code) {
    scansHistory.unshift(code);
    if (scansHistory.length > 30) scansHistory.pop();
    renderSidebar();
}

function renderSidebar() {
    qhList.innerHTML = '';
    const toShow = scansHistory.slice(1);
    if (!toShow.length) { qhSidebar.style.display = 'none'; return; }

    toShow.forEach((code, i) => {
        const realIdx = i + 1;
        const card = document.createElement('div');
        card.className = 'qh-card';
        card.dataset.idx = realIdx;

        const cvs = document.createElement('canvas');
        new QRious({ element: cvs, value: code, size: 130, background: '#fff', foreground: '#000' });
        const img = document.createElement('img');
        img.src = cvs.toDataURL();

        const label = document.createElement('div');
        label.className = 'qh-card-code';
        label.textContent = code;

        card.appendChild(img); card.appendChild(label);
        card.addEventListener('click', e => { e.stopPropagation(); openHistViewer(realIdx); });
        qhList.appendChild(card);
    });
    qhSidebar.style.display = 'flex';
}

function highlightSidebarCard(idx) {
    document.querySelectorAll('.qh-card').forEach(c => { c.classList.toggle('active', parseInt(c.dataset.idx) === idx); });
}

// ═══════════════════════════════════
// QR OVERLAY (Central)
// ═══════════════════════════════════
const bigQrCanvas  = document.getElementById('bigQrCanvas');
const overlayTextEl = document.getElementById('overlayText');
const qrOverlay     = document.getElementById('qrOverlay');

function showOverlay(code) {
    overlayTextEl.textContent = code;
    new QRious({ element: bigQrCanvas, value: code, size: 280, background:'#fff', foreground:'#000' });
    addToHistory(code);
    qrOverlay.style.display = 'flex';
}

function closeOverlay() {
    if (!histViewer.classList.contains('hidden')) { closeHistViewer(); return; }
    qrOverlay.style.display = 'none';
    setStatus('statusReady');
}

// ═══════════════════════════════════
// HISTORY VIEWER (Modal)
// ═══════════════════════════════════
const histViewer = document.getElementById('histViewer');
const hvCanvas   = document.getElementById('hvCanvas');
const hvCode     = document.getElementById('hvCode');
const hvCounter  = document.getElementById('hvCounter');
const hvPrev     = document.getElementById('hvPrev');
const hvNext     = document.getElementById('hvNext');
const hvClose    = document.getElementById('hvClose');
const hvBg       = document.getElementById('hvBg');

let hvIndex = 0;

function openHistViewer(idx) {
    if (!scansHistory.length) return;
    hvIndex = Math.max(0, Math.min(idx, scansHistory.length - 1));
    renderHistViewer();
    histViewer.classList.remove('hidden');
}

function closeHistViewer() {
    histViewer.classList.add('hidden');
    highlightSidebarCard(-1);
}

function renderHistViewer() {
    const code = scansHistory[hvIndex];
    hvCode.textContent = code;
    // Zamiast img.src jak wcześniej, malujemy bezpośrednio na canvas za pomocą QRious
    new QRious({ element: hvCanvas, value: code, size: 300, background:'#fff', foreground:'#000' });
    hvCounter.textContent = `${hvIndex + 1} / ${scansHistory.length}`;
    hvPrev.disabled = hvIndex <= 0;
    hvNext.disabled = hvIndex >= scansHistory.length - 1;
    highlightSidebarCard(hvIndex);
}

hvPrev.addEventListener('click', e => { e.stopPropagation(); if (hvIndex > 0) { hvIndex--; renderHistViewer(); } });
hvNext.addEventListener('click', e => { e.stopPropagation(); if (hvIndex < scansHistory.length - 1) { hvIndex++; renderHistViewer(); } });
hvClose.addEventListener('click', e => { e.stopPropagation(); closeHistViewer(); });
hvBg.addEventListener('click', closeHistViewer);
document.querySelector('.hv-wrap').addEventListener('click', e => e.stopPropagation());

// Keyboard
document.addEventListener('keydown', e => {
    if (!histViewer.classList.contains('hidden')) {
        if (e.key === 'ArrowLeft')  { e.preventDefault(); if (hvIndex > 0) { hvIndex--; renderHistViewer(); } }
        if (e.key === 'ArrowRight') { e.preventDefault(); if (hvIndex < scansHistory.length - 1) { hvIndex++; renderHistViewer(); } }
        if (e.key === 'Escape') closeHistViewer();
        return;
    }
    if (qrOverlay.style.display === 'flex') {
        if (e.key === ' ' || e.key === 'Spacebar') { e.preventDefault(); doQuickCapture(); }
        if (e.key === 'Escape') closeOverlay();
    }
});

initMode(); loadStoredRegion(); loadStoredWindow(); applyTranslations();
</script>
